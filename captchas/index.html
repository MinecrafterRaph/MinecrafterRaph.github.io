<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>404 - Seite wurde noch nicht fertiggestellt</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .box {
      text-align: center;
    }
    h1 {
      font-size: 4rem;
      margin: 0 0 0.5rem;
    }
    p {
      margin: 0 0 1.5rem;
    }
    a.button {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: #3b82f6;
      color: #ffffff;
      text-decoration: none;
      border-radius: 0.375rem;
      font-weight: bold;
    }
    a.button:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>404</h1>
    <p>Die Seite wurde nicht gefunden.</p>
    <a class="button" href="/index.html">Zur Home-Seite</a>
  </div>
</body>
</html>
