<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Editor Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
    body {
        font-family: Arial, sans-serif;
        background: #eaeaea;
        padding: 40px;
    }

    #loginBox, #editorBox {
        max-width: 400px;
        margin: auto;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    #editorBox { display: none; }

    input {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
    }

    button {
        width: 100%;
        padding: 10px;
        margin-top: 15px;
        background: black;
        color: white;
        border: none;
        cursor: pointer;
    }
</style>
</head>
<body>

<div id="loginBox">
    <h2>Editor Login</h2>
    <input type="password" id="code" placeholder="Code eingeben">
    <button onclick="login()">Login</button>
    <p id="error" style="color:red; display:none;">Falscher Code!</p>
</div>

<div id="editorBox">
    <h2>Editor</h2>

    <label>Textfarbe:</label>
    <input type="color" id="textColor" onchange="save()">

    <label>Hintergrundfarbe:</label>
    <input type="color" id="bgColor" onchange="save()">

    <label>Schriftgröße (px):</label>
    <input type="number" id="fontSize" value="16" onchange="save()">

    <label>Seitenbreite (px):</label>
    <input type="number" id="pageWidth" value="900" onchange="save()">

    <label>Titel ändern:</label>
    <input type="text" id="customTitle" placeholder="Neuer Titel" onchange="save()">

    <button onclick="window.location.href='index.html'">Zur Zeitung</button>
</div>

<script>
function login() {
    if (document.getElementById("code").value === "13243") {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("editorBox").style.display = "block";
    } else {
        document.getElementById("error").style.display = "block";
    }
}

function save() {
    localStorage.setItem("textColor", document.getElementById("textColor").value);
    localStorage.setItem("bgColor", document.getElementById("bgColor").value);
    localStorage.setItem("fontSize", document.getElementById("fontSize").value);
    localStorage.setItem("pageWidth", document.getElementById("pageWidth").value);
    localStorage.setItem("customTitle", document.getElementById("customTitle").value);
}
</script>

</body>
</html>
