<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Schulzeitung Interaktiv</title>
<style>
body { margin:0; font-family: 'Times New Roman', serif; background:#fdf8f0; color:#222; }
nav { background:#3a2c1b; color:#fff; padding:10px; display:flex; gap:12px; border-bottom:3px solid gold; }
nav button { background:#5b482b; color:#fff; border:none; padding:8px 16px; cursor:pointer; border-radius:4px; font-weight:bold; border:1px solid #d4af37; }
nav button:hover { background:#7c5e3e; }
.box { background:#fffaf0; border:2px solid #d4af37; margin:12px; padding:12px; box-shadow:3px 3px 10px #aaa; border-radius:6px; }
.hidden { display:none; }
input, textarea { width:100%; margin:5px 0; padding:6px; font-family:'Times New Roman', serif; border-radius:4px; border:1px solid #aaa; }
textarea { min-height:120px; }
h2, h3 { text-shadow: 1px 1px 2px #ccc; color:#4b3e2b; }
.gold-frame { border:2px solid #d4af37; padding:8px; border-radius:6px; box-shadow:1px 1px 6px #aaa; transition:transform 0.5s; }
.gold-frame:hover { transform:scale(1.02); }
</style>
</head>
<body>
<nav>
<b>Schulzeitung</b>
<button onclick="show('home')">Start</button>
<button onclick="show('archive')">Archiv</button>
<button onclick="show('editor')">Editor</button>
<button onclick="showLogin()">Login</button>
<button onclick="adminAccess()">Admin</button>
<button onclick="window.location.href='comments.html'">Kommentare</button>
</nav>

<div id="loginBox" class="box hidden">
<h3>Email Login</h3>
<input id="email" placeholder="Email-Adresse">
<button onclick="login()">Login</button>
</div>

<div id="home" class="box"></div>
<div id="archive" class="hidden box"></div>
<div id="editor" class="hidden box"></div>
<div id="admin" class="hidden box"></div>
<div id="articleView" class="hidden box"></div>

<script>
let articles=[];
let submissions=[];
let approvedEmails=[];
let users=[];
let currentUser=null;

function show(id){
  ['home','archive','editor','admin','articleView'].forEach(x=>document.getElementById(x).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function showLogin(){
  document.getElementById('loginBox').classList.toggle('hidden');
}

function login(){
  let email=document.getElementById('email').value;
  let approved=approvedEmails.find(e=>e.email===email);
  if(!approved){alert('Email nicht freigegeben'); return;}
  currentUser=approved;
  alert('Eingeloggt als '+approved.role);
  if(approved.role==='admin'){renderAdmin(); show('admin');}
  else if(approved.role==='editor'){renderEditor(); show('editor');}
  else{show('home');}
}

function adminAccess(){
  let code=prompt('Admin-Code:');
  if(code==='13243!'){currentUser={role:'admin'}; renderAdmin(); show('admin');}
  else{alert('Falscher Code');}
}

function saveAll(){
  localStorage.setItem('articles',JSON.stringify(articles));
  localStorage.setItem('submissions',JSON.stringify(submissions));
  localStorage.setItem('approvedEmails',JSON.stringify(approvedEmails));
  localStorage.setItem('users',JSON.stringify(users));
}

function createArticle(title,content,cat){
  articles.push({id:Date.now(),title,content,category:cat,approved:true});
  saveAll();
  renderHome();
}

function renderHome(){
  let el=document.getElementById('home');
  el.innerHTML='<h2>Neueste Artikel</h2>';
  articles.slice(-5).reverse().forEach(a=>{
    let d=document.createElement('div');
    d.className='box gold-frame';
    d.innerHTML=`<h3>${a.title}</h3><small>${a.category}</small><p>${a.content.substring(0,200)}...</p><button onclick="showArticle(${a.id})">Artikel anzeigen</button>`;
    el.appendChild(d);
  });
}

function showArticle(id){
  let a=articles.find(x=>x.id===id);
  if(!a) return;
  let el=document.getElementById('articleView');
  el.innerHTML=`<h2>${a.title}</h2><h4>${a.category}</h4><p>${a.content}</p><button onclick="show('home')">Zurück</button>`;
  show('articleView');
}

renderHome();
</script>
</body>
</html>
<script>
// Archiv rendern und Artikel-Boxen
function renderArchive(){
  let el=document.getElementById('archive');
  el.innerHTML='<h2>Archiv</h2>';
  articles.forEach(a=>{
    let d=document.createElement('div');
    d.className='box gold-frame';
    d.innerHTML=`<h3>${a.title}</h3><small>${a.category}</small>
      <p>${a.content.substring(0,150)}...</p>
      <button onclick="showArticlePageById(${a.id})">Artikel anzeigen</button>`;
    el.appendChild(d);
  });
}

// Page-Flip Grundstruktur
function showArticlePageById(id){
  let index=articles.findIndex(a=>a.id===id);
  showArticlePage(index);
}

let currentPageIndex=0;

function showArticlePage(index){
  if(!articles[index]) return;
  currentPageIndex=index;
  let article=articles[index];
  let el=document.getElementById('articleView');
  el.innerHTML='';

  // Page-Flip Container
  let pageContainer=document.createElement('div');
  pageContainer.className='article-page';
  
  article.content.match(/.{1,500}/g).forEach((chunk,i)=>{
    let page=document.createElement('div');
    page.className='page';
    page.innerHTML=`<div class="page-content">${chunk}</div>
      <div style="margin-top:10px;">
      <button onclick="prevArticlePage()">Zurück</button>
      <button onclick="nextArticlePage()">Vor</button>
      </div>`;
    pageContainer.appendChild(page);
  });

  el.appendChild(pageContainer);
  show('articleView');
}

function nextArticlePage(){
  if(currentPageIndex+1<articles.length){
    currentPageIndex++;
    showArticlePage(currentPageIndex);
  }
}

function prevArticlePage(){
  if(currentPageIndex-1>=0){
    currentPageIndex--;
    showArticlePage(currentPageIndex);
  }
}

// Animation für Page-Flip (einfacher Effekt)
function addFlipAnimation(page){
  page.style.transition='transform 0.8s';
  page.style.transform='rotateY(180deg)';
}

// Archiv-Filter nach Kategorie
function filterArchive(cat){
  let filtered=articles.filter(a=>a.category===cat);
  let el=document.getElementById('archive');
  el.innerHTML=`<h2>Archiv - ${cat}</h2>`;
  filtered.forEach(a=>{
    let d=document.createElement('div');
    d.className='box gold-frame';
    d.innerHTML=`<h3>${a.title}</h3><small>${a.category}</small>
      <p>${a.content.substring(0,150)}...</p>
      <button onclick="showArticlePageById(${a.id})">Artikel anzeigen</button>`;
    el.appendChild(d);
  });
}

// Initial render Archive
renderArchive();
</script>
<script>
// Editor rendern
function renderEditor(){
  let el=document.getElementById('editor');
  el.innerHTML=`
    <h2>Editor</h2>
    <div class="toolbar">
      <button onclick="document.execCommand('bold',false,null)">B</button>
      <button onclick="document.execCommand('italic',false,null)">I</button>
      <button onclick="document.execCommand('insertUnorderedList',false,null)">Liste</button>
      <button onclick="insertLink()">Link</button>
      <button onclick="insertImage()">Bild</button>
      <button onclick="insertTable()">Tabelle</button>
    </div>
    <div id="editorBox" class="editor-box" contenteditable="true"></div>
    <label>Animation:</label>
    <select id="animationList">
      <option value="none">Keine</option>
      <option value="fade">Fade</option>
      <option value="slide">Slide</option>
      <option value="bounce">Bounce</option>
      <option value="zoom">Zoom</option>
    </select>
    <button onclick="saveRichText()">Speichern</button>
  `;
}

// Editor Funktionen
function insertImage(){
  let url=prompt('Bild URL:');
  if(url) document.execCommand('insertImage',false,url);
}

function insertLink(){
  let url=prompt('Link URL:');
  if(url) document.execCommand('createLink',false,url);
}

function insertTable(){
  let rows=parseInt(prompt('Anzahl Reihen:'));
  let cols=parseInt(prompt('Anzahl Spalten:'));
  if(!rows || !cols) return;
  let html='<table class="table-editor">';
  for(let r=0;r<rows;r++){
    html+='<tr>';
    for(let c=0;c<cols;c++){ html+='<td>Text</td>'; }
    html+='</tr>';
  }
  html+='</table>';
  document.execCommand('insertHTML',false,html);
}

function saveRichText(){
  let content=document.getElementById('editorBox').innerHTML;
  let title=prompt('Titel des Artikels:');
  let category=prompt('Kategorie:');
  let animation=document.getElementById('animationList').value;
  if(title && category && content){
    createArticle(title,content,category);
    articles[articles.length-1].animations=[animation];
    saveAll();
    alert('Artikel gespeichert!');
  }
}

// Editor initial render
renderEditor();
</script>
<script>
// Erweiterte Animationen beim Speichern
function applyAnimation(el,animation){
  switch(animation){
    case 'fade': el.style.transition='opacity 1s'; el.style.opacity=0; setTimeout(()=>el.style.opacity=1,10); break;
    case 'slide': el.style.transition='transform 0.5s'; el.style.transform='translateX(-100%)'; setTimeout(()=>el.style.transform='translateX(0)',10); break;
    case 'bounce': el.style.animation='bounceAnim 1s'; break;
    case 'zoom': el.style.transition='transform 0.5s'; el.style.transform='scale(0)'; setTimeout(()=>el.style.transform='scale(1)',10); break;
  }
}

// Drag & Drop Editor
function enableDragDrop(){
  let editorBox=document.getElementById('editorBox');
  editorBox.addEventListener('dragstart',e=>{ e.dataTransfer.setData('text/html',e.target.outerHTML); });
  editorBox.addEventListener('dragover',e=>e.preventDefault());
  editorBox.addEventListener('drop',e=>{
    e.preventDefault();
    let data=e.dataTransfer.getData('text/html');
    let range=document.caretRangeFromPoint(e.clientX,e.clientY);
    if(range) { range.insertNode(new DOMParser().parseFromString(data,'text/html').body.firstChild); }
  });
}

// Key Shortcuts
document.addEventListener('keydown',e=>{
  if(e.ctrlKey && e.key==='b'){ document.execCommand('bold'); e.preventDefault(); }
  if(e.ctrlKey && e.key==='i'){ document.execCommand('italic'); e.preventDefault(); }
  if(e.ctrlKey && e.key==='l'){ document.execCommand('insertUnorderedList'); e.preventDefault(); }
});

// Animation CSS Keyframes
let style=document.createElement('style');
style.innerHTML=`
@keyframes bounceAnim{
  0%{transform:translateY(0);}
  30%{transform:translateY(-20px);}
  50%{transform:translateY(0);}
  70%{transform:translateY(-10px);}
  100%{transform:translateY(0);}
}
.table-editor td{border:1px solid #d4af37; padding:4px;}
.editor-box{border:2px solid #d4af37; min-height:300px; padding:8px; margin-top:8px;}
`;
document.head.appendChild(style);

// Editor Erweiterung: Vorschau
function previewArticle(){
  let content=document.getElementById('editorBox').innerHTML;
  let win=window.open('','_blank','width=600,height=800');
  win.document.write('<html><head><title>Vorschau</title></head><body>'+content+'</body></html>');
  win.document.close();
}

// Erweiterte Tabellen-Optionen
function insertAdvancedTable(){
  let rows=parseInt(prompt('Reihen:'));
  let cols=parseInt(prompt('Spalten:'));
  let table='<table class="table-editor">';
  for(let r=0;r<rows;r++){
    table+='<tr>';
    for(let c=0;c<cols;c++){
      table+='<td style="padding:6px;border:1px solid #d4af37;">Zelle</td>';
    }
    table+='</tr>';
  }
  table+='</table>';
  document.execCommand('insertHTML',false,table);
}

enableDragDrop();
</script>
<script>
// Admin Panel rendern
function renderAdmin(){
  let el=document.getElementById('admin');
  el.innerHTML=`
    <h2>Admin Panel</h2>
    <div class="box gold-frame">
      <h3>Email-Freigabe</h3>
      <input id="newEmail" placeholder="Email hinzufügen">
      <select id="roleSelect">
        <option value="editor">Editor</option>
        <option value="reader">Leser</option>
        <option value="admin">Admin</option>
      </select>
      <button onclick="addApprovedEmail()">Freigeben</button>
      <div id="approvedList"></div>
    </div>
    <div class="box gold-frame">
      <h3>Eingereichte Artikel</h3>
      <div id="submissionsList"></div>
    </div>
  `;
  renderApprovedEmails();
  renderSubmissions();
}

// Freigeben von Emails
function addApprovedEmail(){
  let email=document.getElementById('newEmail').value;
  let role=document.getElementById('roleSelect').value;
  if(!email) return alert('Email fehlt!');
  if(!approvedEmails.find(e=>e.email===email)){
    approvedEmails.push({email,role});
    saveAll();
    renderApprovedEmails();
    alert(email+' freigegeben als '+role);
  } else { alert('Email bereits freigegeben'); }
}

// Anzeige der freigegebenen Emails
function renderApprovedEmails(){
  let el=document.getElementById('approvedList');
  el.innerHTML='<ul>'+approvedEmails.map(e=>`<li>${e.email} - ${e.role} <button onclick="removeApprovedEmail('${e.email}')">Entfernen</button></li>`).join('')+'</ul>';
}

function removeApprovedEmail(email){
  approvedEmails=approvedEmails.filter(e=>e.email!==email);
  saveAll();
  renderApprovedEmails();
}

// Submission Verwaltung
function renderSubmissions(){
  let el=document.getElementById('submissionsList');
  if(submissions.length===0){ el.innerHTML='<p>Keine neuen Einreichungen</p>'; return; }
  el.innerHTML='';
  submissions.forEach((s,i)=>{
    let d=document.createElement('div');
    d.className='box gold-frame';
    d.innerHTML=`<h4>${s.title}</h4><small>${s.category}</small><p>${s.content.substring(0,200)}...</p>
      <button onclick="approveSubmission(${i})">Freigeben</button>
      <button onclick="rejectSubmission(${i})">Ablehnen</button>`;
    el.appendChild(d);
  });
}

function approveSubmission(i){
  let s=submissions[i];
  createArticle(s.title,s.content,s.category);
  submissions.splice(i,1);
  saveAll();
  renderSubmissions();
}

function rejectSubmission(i){
  submissions.splice(i,1);
  saveAll();
  renderSubmissions();
}
</script>
<script>
// Submission Panel rendern (für Leser oder Redakteure)
function renderSubmissionPanel(){
  let el=document.getElementById('editor');
  el.innerHTML=`
    <h2>Artikel einreichen</h2>
    <div class="box gold-frame">
      <input id="subTitle" placeholder="Titel">
      <textarea id="subContent" placeholder="Artikelinhalt"></textarea>
      <input id="subCategory" placeholder="Kategorie">
      <button onclick="submitArticle()">Einreichen</button>
    </div>
    <h3>Eingereichte Artikel (Status)</h3>
    <div id="mySubmissions"></div>
  `;
  renderMySubmissions();
}

// Submission einreichen
function submitArticle(){
  let title=document.getElementById('subTitle').value;
  let content=document.getElementById('subContent').value;
  let category=document.getElementById('subCategory').value;
  if(!title||!content||!category){ alert('Bitte alle Felder ausfüllen'); return; }
  submissions.push({title,content,category,author:currentUser.email});
  saveAll();
  alert('Artikel eingereicht und wartet auf Freigabe');
  renderMySubmissions();
}

// Eigene Submissions anzeigen
function renderMySubmissions(){
  let el=document.getElementById('mySubmissions');
  let mySubs=submissions.filter(s=>s.author===currentUser.email);
  if(mySubs.length===0){ el.innerHTML='<p>Keine Einreichungen</p>'; return; }
  el.innerHTML='';
  mySubs.forEach((s,i)=>{
    let d=document.createElement('div');
    d.className='box gold-frame';
    d.innerHTML=`<h4>${s.title}</h4><small>${s.category}</small>
      <p>${s.content.substring(0,150)}...</p>`;
    el.appendChild(d);
  });
}

// Admin Approval System (Zusatz)
function checkPendingSubmissions(){
  if(currentUser?.role==='admin'){
    renderSubmissions();
  }
}

// Einreichung automatisch in Approval Queue speichern
function submitToAdminQueue(sub){
  submissions.push(sub);
  saveAll();
  checkPendingSubmissions();
}

// Beispiel: Automatische Freigabe bei Editor
function autoApproveSubmission(sub){
  if(currentUser?.role==='editor'){
    createArticle(sub.title,sub.content,sub.category);
    saveAll();
    alert('Artikel direkt veröffentlicht');
  } else {
    submitToAdminQueue(sub);
  }
}
</script>
<script>
// Mehrseitige Artikelseiten rendern mit Page-Flip
function renderArticlePages(article){
  let el=document.getElementById('articleView');
  el.innerHTML='';
  let container=document.createElement('div');
  container.className='article-pages-container';
  
  // Splitte Artikel in Seiten à 400 Zeichen
  let pages=article.content.match(/.{1,400}/g);
  pages.forEach((text,i)=>{
    let page=document.createElement('div');
    page.className='article-page gold-frame';
    page.style.minHeight='200px';
    page.innerHTML=`<div class="page-text">${text}</div>
      <div style="margin-top:10px;">
        <button onclick="prevArticlePage()">Zurück</button>
        <button onclick="nextArticlePage()">Vor</button>
      </div>`;
    container.appendChild(page);
  });
  el.appendChild(container);
  show('articleView');
  applyPageFlip(container);
}

// Page-Flip Effekt
function applyPageFlip(container){
  let pages=container.children;
  for(let i=0;i<pages.length;i++){
    pages[i].style.transition='transform 0.6s';
    pages[i].style.transform='rotateY(0deg)';
    pages[i].style.backfaceVisibility='hidden';
    if(i>0) pages[i].style.transform='rotateY(180deg)';
  }
}

// Navigation durch Seiten
function nextArticlePage(){
  let container=document.querySelector('.article-pages-container');
  if(!container) return;
  let pages=container.children;
  for(let i=0;i<pages.length;i++){
    let deg=parseInt(pages[i].style.transform.replace('rotateY(','').replace('deg)',''));
    if(deg===0 && i<pages.length-1){
      pages[i].style.transform='rotateY(-180deg)';
      pages[i+1].style.transform='rotateY(0deg)';
      break;
    }
  }
}

function prevArticlePage(){
  let container=document.querySelector('.article-pages-container');
  if(!container) return;
  let pages=container.children;
  for(let i=pages.length-1;i>=0;i--){
    let deg=parseInt(pages[i].style.transform.replace('rotateY(','').replace('deg)',''));
    if(deg===0 && i>0){
      pages[i].style.transform='rotateY(180deg)';
      pages[i-1].style.transform='rotateY(0deg)';
      break;
    }
  }
}
</script>
<script>
// Quiz und Rätsel Container
function renderQuiz(){
  let el=document.getElementById('editor');
  el.innerHTML=`
    <h2>Rätsel / Quiz erstellen</h2>
    <div class="box gold-frame">
      <input id="quizQuestion" placeholder="Frage">
      <input id="quizAnswer" placeholder="Antwort">
      <button onclick="addQuiz()">Hinzufügen</button>
    </div>
    <h3>Rätsel</h3>
    <div id="quizList"></div>
  `;
  renderQuizList();
}

let quizzes=[];

// Quiz hinzufügen
function addQuiz(){
  let question=document.getElementById('quizQuestion').value;
  let answer=document.getElementById('quizAnswer').value;
  if(!question || !answer){ alert('Frage und Antwort erforderlich'); return; }
  quizzes.push({question,answer});
  saveAll();
  renderQuizList();
}

// Quiz Liste rendern
function renderQuizList(){
  let el=document.getElementById('quizList');
  el.innerHTML='';
  quizzes.forEach((q,i)=>{
    let d=document.createElement('div');
    d.className='box gold-frame';
    d.innerHTML=`<p>${q.question}</p>
      <input id="quizInput${i}" placeholder="Antwort">
      <button onclick="checkQuiz(${i})">Prüfen</button>
      <span id="quizResult${i}"></span>`;
    el.appendChild(d);
  });
}

// Quiz prüfen
function checkQuiz(i){
  let userAns=document.getElementById(`quizInput${i}`).value.toLowerCase();
  let correctAns=quizzes[i].answer.toLowerCase();
  let res=document.getElementById(`quizResult${i}`);
  if(userAns===correctAns) res.innerHTML='<b>✅ Richtig!</b>';
  else res.innerHTML=`<b>❌ Falsch! Richtige Antwort: ${quizzes[i].answer}</b>`;
}

// Quiz Anzeige im Artikel
function renderQuizInArticle(article){
  let el=document.getElementById('articleView');
  el.innerHTML='<h2>Rätsel / Quiz</h2>';
  quizzes.forEach((q,i)=>{
    let d=document.createElement('div');
    d.className='box gold-frame';
    d.innerHTML=`<p>${q.question}</p>
      <input id="quizInputView${i}" placeholder="Antwort">
      <button onclick="checkQuizView(${i})">Prüfen</button>
      <span id="quizResultView${i}"></span>`;
    el.appendChild(d);
  });
}

// Prüfung im Artikel-View
function checkQuizView(i){
  let userAns=document.getElementById(`quizInputView${i}`).value.toLowerCase();
  let correctAns=quizzes[i].answer.toLowerCase();
  let res=document.getElementById(`quizResultView${i}`);
  if(userAns===correctAns) res.innerHTML='<b>✅ Richtig!</b>';
  else res.innerHTML=`<b>❌ Falsch! Richtige Antwort: ${quizzes[i].answer}</b>`;
}
</script>
<script>
// Archiv Scroll-Effekte
function enableScrollAnimations(){
  let archive=document.getElementById('archive');
  archive.addEventListener('scroll',()=>{
    let boxes=archive.querySelectorAll('.box');
    boxes.forEach(b=>{
      let rect=b.getBoundingClientRect();
      if(rect.top < window.innerHeight && rect.bottom > 0){
        b.style.transform='translateY(0px)';
        b.style.opacity='1';
        b.style.transition='all 0.8s ease-out';
      } else {
        b.style.transform='translateY(20px)';
        b.style.opacity='0.5';
      }
    });
  });
}

// Goldrahmen Hover Effekt
function applyGoldHover(){
  document.querySelectorAll('.gold-frame').forEach(el=>{
    el.addEventListener('mouseenter',()=>{
      el.style.boxShadow='0 0 20px gold';
      el.style.transform='scale(1.03)';
    });
    el.addEventListener('mouseleave',()=>{
      el.style.boxShadow='3px 3px 10px #aaa';
      el.style.transform='scale(1)';
    });
  });
}

// Archiv Artikel-Filter Buttons
function renderArchiveFilters(){
  let el=document.getElementById('archive');
  let categories=[...new Set(articles.map(a=>a.category))];
  let btnContainer=document.createElement('div');
  btnContainer.style.marginBottom='8px';
  categories.forEach(c=>{
    let btn=document.createElement('button');
    btn.innerText=c;
    btn.onclick=()=>filterArchive(c);
    btnContainer.appendChild(btn);
  });
  el.prepend(btnContainer);
}

// Artikel Hover Animation
function applyArticleHover(){
  document.querySelectorAll('.article-page').forEach(page=>{
    page.addEventListener('mouseenter',()=>page.style.transform='scale(1.02)');
    page.addEventListener('mouseleave',()=>page.style.transform='scale(1)');
  });
}

// Initialisierung aller Effekte
function initVisualEffects(){
  enableScrollAnimations();
  applyGoldHover();
  applyArticleHover();
}

// Effekte nach Rendering anwenden
document.addEventListener('DOMContentLoaded',initVisualEffects);
</script>
<script>
// Archiv Scroll-Effekte

  let archive=document.getElementById('archive');
  archive.addEventListener('scroll',()=>{
    let boxes=archive.querySelectorAll('.box');
    boxes.forEach(b=>{
      let rect=b.getBoundingClientRect();
      if(rect.top < window.innerHeight && rect.bottom > 0){
        b.style.transform='translateY(0px)';
        b.style.opacity='1';
        b.style.transition='all 0.8s ease-out';

<script>
// WYSIWYG Editor initialisieren
function initEditor(){
  let editor=document.getElementById('editor');
  editor.innerHTML=`
    <h2>Artikel Editor</h2>
    <div class="toolbar box gold-frame" style="margin-bottom:6px;">
      <button onclick="formatText('bold')">Fett</button>
      <button onclick="formatText('italic')">Kursiv</button>
      <button onclick="formatText('underline')">Unterstrichen</button>
      <button onclick="insertTable()">Tabelle</button>
      <button onclick="insertMedia('image')">Bild</button>
      <button onclick="insertMedia('audio')">Audio</button>
      <button onclick="insertMedia('video')">Video</button>
    </div>
    <div id="editorContent" contenteditable="true" class="editor-box box gold-frame" style="min-height:200px;"></div>
    <button onclick="saveEditorContent()">Speichern</button>
  `;
}

// Text formatieren
function formatText(cmd){
  document.execCommand(cmd,false,null);
}

// Tabelle einfügen
function insertTable(){
  let rows=parseInt(prompt('Anzahl Zeilen?','2'));
  let cols=parseInt(prompt('Anzahl Spalten?','2'));
  if(isNaN(rows)||isNaN(cols)) return;
  let table='<table border="1" style="border-collapse:collapse;margin:8px 0;">';
  for(let r=0;r<rows;r++){
    table+='<tr>';
    for(let c=0;c<cols;c++){
      table+='<td>Text</td>';
    }
    table+='</tr>';
  }
  table+='</table>';
  document.execCommand('insertHTML',false,table);
}

// Medien einfügen (Bild/Audio/Video)
function insertMedia(type){
  let url=prompt('URL für '+type);
  if(!url) return;
  let html='';
  if(type==='image') html=`<img src="${url}" style="width:100%;margin:6px 0;border:2px solid gold;">`;
  if(type==='audio') html=`<audio controls style="margin:6px 0;"><source src="${url}" type="audio/mpeg">Ihr Browser unterstützt kein Audio.</audio>`;
  if(type==='video') html=`<video controls width="100%" style="margin:6px 0;"><source src="${url}" type="video/mp4">Ihr Browser unterstützt kein Video.</video>`;
  document.execCommand('insertHTML',false,html);
}

// Drag & Drop Media im Editor
function enableDragDrop(){
  let editorContent=document.getElementById('editorContent');
  editorContent.addEventListener('dragover',e=>e.preventDefault());
  editorContent.addEventListener('drop',e=>{
    e.preventDefault();
    let files=e.dataTransfer.files;
    for(let f of files){
      let reader=new FileReader();
      reader.onload=function(evt){
        let img=`<img src="${evt.target.result}" style="width:100%;margin:6px 0;border:2px solid gold;">`;
        document.execCommand('insertHTML',false,img);
      };
      if(f.type.startsWith('image/')) reader.readAsDataURL(f);
    }
  });
}

// Editor-Inhalt speichern
function saveEditorContent(){
  let content=document.getElementById('editorContent').innerHTML;
  currentArticle.content=content;
  saveAll();
  alert('Artikel gespeichert');
}

initEditor();
enableDragDrop();
</script>

<script>
// Rätsel/Quiz hinzufügen
function insertQuiz(){
  let question=prompt('Frage für das Quiz:');
  if(!question) return;
  let options=[];
  for(let i=0;i<4;i++){
    let opt=prompt('Option '+(i+1));
    if(!opt) return;
    options.push(opt);
  }
  let correct=parseInt(prompt('Nummer der richtigen Antwort (1-4)'))-1;
  if(isNaN(correct) || correct<0 || correct>3) return alert('Ungültige Antwort');
  let html='<div class="quiz box gold-frame" style="margin:8px 0;padding:6px;">';
  html+=`<p>${question}</p>`;
  options.forEach((o,i)=>{
    html+=`<button class="quizOption" onclick="checkAnswer(this,${i},${correct})">${o}</button>`;
  });
  html+='</div>';
  document.execCommand('insertHTML',false,html);
}

// Quiz prüfen
function checkAnswer(btn,index,correct){
  if(index===correct){
    btn.style.background='gold';
    btn.style.color='black';
    alert('Richtig!');
  } else{
    btn.style.background='gray';
    btn.style.color='white';
    alert('Falsch! Richtig war Option '+(correct+1));
  }

<script>
// Rätsel/Quiz hinzufügen
function insertQuiz(){
  let question=prompt('Frage für das Quiz:');
  if(!question) return;
  let options=[];
  for(let i=0;i<4;i++){
    let opt=prompt('Option '+(i+1));
    if(!opt) return;
    options.push(opt);
  }
  let correct=parseInt(prompt('Nummer der richtigen Antwort (1-4)'))-1;
  if(isNaN(correct) || correct<0 || correct>3) return alert('Ungültige Antwort');
  let html='<div class="quiz box gold-frame" style="margin:8px 0;padding:6px;">';
  html+=`<p>${question}</p>`;
  options.forEach((o,i)=>{
    html+=`<button class="quizOption" onclick="checkAnswer(this,${i},${correct})">${o}</button>`;
  });
  html+='</div>';
  document.execCommand('insertHTML',false,html);
}

    btn.style.color='white';

<script>
// Scroll Animation für Artikel-Boxen
function applyScrollAnimations(){
  let boxes=document.querySelectorAll('.box');
  boxes.forEach(b=>{
    b.style.opacity='0';
    b.style.transform='translateY(30px)';
    b.style.transition='opacity 0.6s ease, transform 0.6s ease';
  });

  window.addEventListener('scroll',()=>{
    boxes.forEach(b=>{
      let rect=b.getBoundingClientRect();
      if(rect.top < window.innerHeight - 50){
        b.style.opacity='1';
        b.style.transform='translateY(0)';
      }
    });
  });
}

// Blätterbare Seiten Animation verbessern
function enhancePageFlip(){
  document.querySelectorAll('.page').forEach(p=>{
    p.style.cursor='pointer';
    p.addEventListener('mouseenter',()=>p.style.boxShadow='0 0 20px gold');
    p.addEventListener('mouseleave',()=>p.style.boxShadow='none');
    p.addEventListener('click',()=>{
      p.style.transition='transform 0.8s ease';
      p.style.transform='rotateY(180deg)';
    });
  });
}

// Smooth Scroll für interne Links
function initSmoothScroll(){
  document.querySelectorAll('a[href^="#"]').forEach(anchor=>{
    anchor.addEventListener('click',function(e){
      e.preventDefault();
      document.querySelector(this.getAttribute('href')).scrollIntoView({behavior:'smooth'});
    });
  });
}

function animateArticleLoad(){

  });
}

<body>
<h2>Kommentare</h2>

<script>
// Kommentar-Daten simuliert
let comments=[];

// Kommentar rendern
function renderComments(){
  let el=document.getElementById('commentsContainer');
  el.innerHTML='';
  if(comments.length===0){ el.innerHTML='<p>Keine Kommentare vorhanden</p>'; return; }
  comments.forEach((c,i)=>{
    let d=document.createElement('div');
    d.className='box comment-'+c.status;
    d.innerHTML=`<b>${c.name}</b> (${c.status})<p>${c.content}</p>`;
    if(c.status==='pending'){
      let approveBtn=document.createElement('button');
      approveBtn.innerText='Freigeben';
      approveBtn.onclick=()=>{c.status='approved'; renderComments();};
      let rejectBtn=document.createElement('button');
      rejectBtn.innerText='Ablehnen';
      rejectBtn.onclick=()=>{c.status='rejected'; renderComments();};
      d.appendChild(approveBtn);
      d.appendChild(rejectBtn);

    el.appendChild(d);
  });
}

// Kommentar einreichen
function submitComment(){
  let name=document.getElementById('commentName').value.trim();
  let content=document.getElementById('commentContent').value.trim();
  if(!name || !content) return alert('Name und Kommentar erforderlich');
  comments.push({name,content,status:'pending'});
  document.getElementById('commentName').value='';
  document.getElementById('commentContent').value='';
  renderComments();
}

// Initialisierung
document.addEventListener('DOMContentLoaded',()=>{ renderComments(); });
</script>

<script>
// Editor Initialisierung
function initEditor(){
  let el=document.getElementById('editorContent');
  if(!el) return;
  el.innerHTML=`<div id="editorToolbar" class="toolbar box gold-frame" style="margin-bottom:6px;">
    <button onclick="addTextBox()">Text hinzufügen</button>
    <button onclick="addImage()">Bild hinzufügen</button>
    <button onclick="addAnimation()">Animation hinzufügen</button>
  </div>
  <div id="editorCanvas" class="box gold-frame" style="min-height:300px;padding:6px;"></div>`;
}

// Textbox hinzufügen
function addTextBox(){
  let txt=prompt('Text eingeben:');
  if(!txt) return;
  let tb=document.createElement('div');
  tb.className='editorItem box gold-frame';
  tb.style.padding='4px';
  tb.style.margin='4px';
  tb.style.cursor='move';
  tb.contentEditable=true;
  tb.innerText=txt;
  makeDraggable(tb);
  document.getElementById('editorCanvas').appendChild(tb);
}

// Bild hinzufügen
function addImage(){
  let url=prompt('Bild URL eingeben:');
  if(!url) return;
  let img=document.createElement('img');
  img.src=url;
  img.style.width='200px';
  img.style.cursor='move';
  makeDraggable(img);
  document.getElementById('editorCanvas').appendChild(img);
}

// Animation hinzufügen
function addAnimation(){
  let el=document.getElementById('editorCanvas');
  let animBox=document.createElement('div');
  animBox.className='editorItem box gold-frame';
  animBox.style.padding='4px';
  animBox.style.margin='4px';
  animBox.style.background='lightgoldenrodyellow';
  animBox.innerText='✨ Animationsbox ✨';
  animBox.style.cursor='move';
  animBox.style.transition='all 0.5s ease';
  animBox.onclick=()=>{ animBox.style.transform='rotateY(180deg)'; setTimeout(()=>{animBox.style.transform='rotateY(0deg)';},500); };
  makeDraggable(animBox);
  el.appendChild(animBox);
}

// Drag & Drop Funktion
function makeDraggable(el){
  let pos={x:0,y:0,dx:0,dy:0};
  el.onmousedown=function(e){
    e.preventDefault();
    pos.dx=e.clientX-el.offsetLeft;
    pos.dy=e.clientY-el.offsetTop;
    document.onmousemove=dragMove;
    document.onmouseup=stopDrag;
  };
  function dragMove(e){
    el.style.position='absolute';
    el.style.left=(e.clientX-pos.dx)+'px';
    el.style.top=(e.clientY-pos.dy)+'px';
  }
  function stopDrag(){ document.onmousemove=null; document.onmouseup=null; }
}

// Editor Initialisierung
document.addEventListener('DOMContentLoaded',()=>{ initEditor(); });
</script>

<script>

function initPageFlip(issueIndex){
  let issue=issues[issueIndex];
  if(!issue) return;
  let el=document.getElementById('mainContent');
  el.innerHTML=`<h2>${issue.title} (${issue.date})</h2>
    <div id="flipContainer" class="box gold-frame" style="position:relative; width:400px; height:300px; overflow:hidden; margin:12px 0;"></div>
    <button onclick="initIndexPage()">Zurück</button>`;
  let container=document.getElementById('flipContainer');
  let currentPage=0;
  function renderPage(idx){
    container.innerHTML='';
    if(!issue.articles[idx]) return;
    let art=articles.find(a=>a.id===issue.articles[idx]);
    let page=document.createElement('div');
    page.className='page box gold-frame';
    page.style.width='100%';
    page.style.height='100%';
    page.style.padding='8px';
    page.style.position='absolute';
    page.style.left='0';
    page.style.top='0';
    page.style.transition='all 0.5s ease';
    page.innerHTML=`<h3>${art.title}</h3><p>${art.content.substring(0,400)}...</p>
      <button onclick="viewArticle(${art.id})">Vollständig lesen</button>`;
    container.appendChild(page);
  }
  renderPage(currentPage);
  // Umblätter-Buttons
  let prev=document.createElement('button'); prev.innerText='◀'; prev.style.position='absolute'; prev.style.top='50%'; prev.style.left='0';
  let next=document.createElement('button'); next.innerText='▶'; next.style.position='absolute'; next.style.top='50%'; next.style.right='0';
  prev.onclick=()=>{ if(currentPage>0) currentPage--; renderPage(currentPage); };
  next.onclick=()=>{ if(currentPage<issue.articles.length-1) currentPage++; renderPage(currentPage); };

}

// Filterfunktion
function filterSearch(){
  let query=document.getElementById('searchInput').value.toLowerCase();
  let results=document.getElementById('searchResults');

  if(!query) return;
  // Suche in Artikeln
  articles.forEach(a=>{

       a.author.toLowerCase().includes(query) ||
       a.category.toLowerCase().includes(query)){
      let div=document.createElement('div');
      div.className='box gold-frame';
      div.style.margin='4px 0';
      div.innerHTML=`<b>${a.title}</b> (${a.category}) von ${a.author} 
        <button onclick="viewArticle(${a.id})">Anzeigen</button>`;
      results.appendChild(div);
    }
  });
  // Suche in Ausgaben
  issues.forEach((iss,i)=>{
    if(iss.title.toLowerCase().includes(query) ||
       iss.date.toLowerCase().includes(query)){
      let div=document.createElement('div');
      div.className='box gold-frame';
      div.style.margin='4px 0';
      div.innerHTML=`<b>${iss.title}</b> (${iss.date})

    <textarea id="editorContent" placeholder="Inhalt hier..." style="width:100%; height:120px;"></textarea><br>
    <button onclick="saveArticle(${articleId})">Speichern</button>
    <h4>Live Vorschau</h4>
    <div id="editorPreview" class="box gold-frame" style="padding:6px;"></div>`;
  
  document.getElementById('editorContent').addEventListener('input', updateLivePreview);
  document.getElementById('editorTitle').addEventListener('input', updateLivePreview);
  if(articleId!==undefined && articles[articleId]){
    document.getElementById('editorTitle').value=articles[articleId].title;
    document.getElementById('editorContent').value=articles[articleId].content;

  let title=document.getElementById('editorTitle').value;
  let content=document.getElementById('editorContent').value;
  let preview=document.getElementById('editorPreview');
  preview.innerHTML=`<h2>${title}</h2><p>${content}</p>`;

  el.style.transform='scale(1.01)';
  setTimeout(()=>{ el.style.transform='scale(1)'; },300);

// Artikel speichern
function saveArticle(articleId){
  let title=document.getElementById('editorTitle').value.trim();
  let content=document.getElementById('editorContent').value.trim();

    articles[articleId].content=content;
  }

  updateLivePreview();
}

<script>
// Editor Erweiterungen Initialisierung
function initAdvancedEditor(articleId){
  let el=document.getElementById('editorAdvancedSection');
  if(!el){
    el=document.createElement('div');
    el.id='editorAdvancedSection';
    el.className='box gold-frame';
    el.style.margin='12px 0';
    el.style.padding='6px';
    document.getElementById('mainContent').appendChild(el);
  }
  el.innerHTML=`<h3>Erweiterter Editor</h3>
    <div id="editorToolbar" style="margin-bottom:4px;">
      <button onclick="formatText('bold')">Fett</button>
      <button onclick="formatText('italic')">Kursiv</button>
      <button onclick="formatText('h2')">Überschrift</button>
      <button onclick="insertImage()">Bild einfügen</button>
    </div>
    <textarea id="editorAdvancedContent" style="width:100%; height:120px;"></textarea>
    <button onclick="saveAdvancedArticle(${articleId})">Speichern</button>
    <h4>Live Vorschau</h4>
    <div id="editorAdvancedPreview" class="box gold-frame" style="padding:6px;"></div>`;
  
  document.getElementById('editorAdvancedContent').addEventListener('input', updateAdvancedPreview);
  if(articleId!==undefined && articles[articleId]){
    document.getElementById('editorAdvancedContent').value=articles[articleId].content;
    updateAdvancedPreview();
  }
}

// Textformatierung
function formatText(type){
  let textarea=document.getElementById('editorAdvancedContent');
  let start=textarea.selectionStart, end=textarea.selectionEnd;
  if(start===end) return;
  let selected=textarea.value.substring(start,end);
  let replacement=selected;
  switch(type){
    case 'bold': replacement='**'+selected+'**'; break;
    case 'italic': replacement='*'+selected+'*'; break;
    case 'h2': replacement='## '+selected; break;
  }
  textarea.value=textarea.value.substring(0,start)+replacement+textarea.value.substring(end);
  updateAdvancedPreview();
}

// Bild einfügen
function insertImage(){
  let url=prompt('Bild-URL eingeben');
  if(!url) return;
  let textarea=document.getElementById('editorAdvancedContent');
  textarea.value+=`\n![Bild](${url})\n`;
  updateAdvancedPreview();
}

// Live Vorschau für erweiterten Editor
function updateAdvancedPreview(){
  let content=document.getElementById('editorAdvancedContent').value;
  let preview=document.getElementById('editorAdvancedPreview');
  let html=content.replace(/\*\*(.*?)\*\*/g,'<b>$1</b>')
                  .replace(/\*(.*?)\*/g,'<i>$1</i>')
                  .replace(/## (.*?)(\n|$)/g,'<h2>$1</h2>')
                  .replace(/!\[Bild\]\((.*?)\)/g,'<img src="$1" style="max-width:100%; margin:6px 0;">');
  preview.innerHTML=html;
  animatePreview(preview);
}

// Speichern erweiterter Artikel
function saveAdvancedArticle(articleId){
  let content=document.getElementById('editorAdvancedContent').value;
  if(!content.trim()) return alert('Inhalt darf nicht leer sein');
  if(!articles[articleId]){
    articles.push({id:articles.length, title:'Unbenannter Artikel', content, author:currentUser||'Redakteur'});
  }else{
    articles[articleId].content=content;
  }
  saveAll();
  alert('Artikel erfolgreich gespeichert');
  updateAdvancedPreview();
}

// Initialisierung
document.addEventListener('DOMContentLoaded',()=>{
  initAdvancedEditor();
});
</script>

    el.className='box gold-frame';
    el.style.margin='12px 0';
    el.style.padding='6px';
    document.getElementById('mainContent').appendChild(el);
  }
  el.innerHTML=`<h3>Layout Editor (Canva-ähnlich)</h3>
    <div id="layoutToolbar" style="margin-bottom:6px;">
      <button onclick="addBox()">Neue Box</button>
      <button onclick="clearBoxes()">Alle Boxen löschen</button>
    </div>
    <div id="layoutCanvas" class="box gold-frame" style="min-height:200px; position:relative;"></div>`;
}

// Neue Box hinzufügen
function addBox(){
  let canvas=document.getElementById('layoutCanvas');
  let box=document.createElement('div');
  box.className='layoutBox box gold-frame';
  box.style.width='120px';
  box.style.height='80px';
  box.style.position='absolute';
  box.style.top='10px';
  box.style.left='10px';
  box.style.padding='4px';
  box.style.cursor='move';
  box.innerText='Box';
  enableDrag(box);
  canvas.appendChild(box);
}

// Drag & Drop Funktion
function enableDrag(el){
  let posX=0,posY=0,mouseX=0,mouseY=0;
  el.onmousedown=function(e){
    e.preventDefault();
    mouseX=e.clientX; mouseY=e.clientY;
    document.onmousemove=dragMouseMove;
    document.onmouseup=closeDrag;
  };
  function dragMouseMove(e){
    posX=mouseX-e.clientX;
    posY=mouseY-e.clientY;
    mouseX=e.clientX; mouseY=e.clientY;
    el.style.top=(el.offsetTop - posY)+'px';
    el.style.left=(el.offsetLeft - posX)+'px';
  }
  function closeDrag(){ document.onmousemove=null; document.onmouseup=null; }
}

// Alle Boxen löschen
function clearBoxes(){
  let canvas=document.getElementById('layoutCanvas');
  canvas.innerHTML='';
}

// Initialisierung Layout-Editor
document.addEventListener('DOMContentLoaded',()=>{
  initLayoutEditor();
});
</script>
<script>
// Box Stiländerungen
function applyBoxStyles(box){
  box.style.border='2px solid gold';
  box.style.borderRadius='6px';
  box.style.background='lightyellow';
  box.style.padding='4px';
  box.style.margin='4px';
  box.style.cursor='move';
  animateBox(box);
}

// Box Farben ändern
function changeBoxColor(box){
  let color=prompt('Neue Hintergrundfarbe (z.B. lightblue, #FFD700):', box.style.background);
  if(color) box.style.background=color;
}

// Box Größe ändern
function resizeBox(box){
  let width=prompt('Breite in px:', box.offsetWidth);
  let height=prompt('Höhe in px:', box.offsetHeight);
  if(width) box.style.width=width+'px';
  if(height) box.style.height=height+'px';
  animateBox(box);
}

// Kontextmenü für Boxen
function enableBoxContextMenu(box){
  box.oncontextmenu=function(e){
    e.preventDefault();
    let action=prompt('Option: color, size, image');
    if(action==='color') changeBoxColor(box);
    if(action==='size') resizeBox(box);
    if(action==='image') insertImageInBox(box);
  };
}

// Alle existierenden Boxen für Kontextmenü aktivieren
function initBoxContextMenus(){
  document.querySelectorAll('.layoutBox').forEach(box=>{
    enableBoxContextMenu(box);
  });
}

// Initialisierung Layout Editor Feinschliff
document.addEventListener('DOMContentLoaded',()=>{
  initBoxContextMenus();
});
</script>
<script>
// Optimiertes Drag & Drop für flüssiges Bewegen
function enableSmoothDrag(el){
  let offsetX=0, offsetY=0, mouseX=0, mouseY=0;
  el.onmousedown=function(e){
    e.preventDefault();
    mouseX=e.clientX; mouseY=e.clientY;
    document.onmousemove=dragMove;
    document.onmouseup=dragEnd;
  };
  function dragMove(e){
    offsetX=mouseX-e.clientX;
    offsetY=mouseY-e.clientY;
    mouseX=e.clientX; mouseY=e.clientY;
    el.style.left=(el.offsetLeft - offsetX)+'px';
    el.style.top=(el.offsetTop - offsetY)+'px';
    el.style.transition='none';
  }
  function dragEnd(){
    el.style.transition='all 0.2s ease';
    document.onmousemove=null;
    document.onmouseup=null;
  }
}

// Text + Bild in Box formatieren
function formatBoxContent(box, text, imageUrl){
  let html='';
  if(imageUrl) html+=`<img src="${imageUrl}" style="max-width:100%; margin:4px 0;"><br>`;
  if(text) html+=`<p>${text}</p>`;
  box.innerHTML=html;
  animateBox(box);
}

// Box initialisieren für Editor
function initEditorBoxes(){
  document.querySelectorAll('.layoutBox').forEach(box=>{
    enableSmoothDrag(box);
    enableBoxEditing(box);
    enableBoxContextMenu(box);
  });
}

// Neue Box erstellen mit optionalem Text/Bild
function addAdvancedBox(text='', imageUrl=''){
  let canvas=document.getElementById('layoutCanvas');
  if(!canvas) return;
  let box=document.createElement('div');
  box.className='layoutBox box gold-frame';
  box.style.width='120px'; box.style.height='80px';
  box.style.position='absolute'; box.style.top='10px'; box.style.left='10px';
  box.style.padding='4px'; box.style.cursor='move';
  formatBoxContent(box, text, imageUrl);
  canvas.appendChild(box);
  initEditorBoxes();
}

// Initialisierung nach DOM geladen
document.addEventListener('DOMContentLoaded',()=>{
  initEditorBoxes();
});
</script>
<script>
// Textformatierung innerhalb der Box
function formatTextInBox(box){
  let text=prompt('Text eingeben oder bearbeiten:', box.innerText);
  if(!text) return;
  let style=prompt('Format: normal, bold, italic, h2', 'normal');
  switch(style){
    case 'bold': box.innerHTML=`<b>${text}</b>`; break;
    case 'italic': box.innerHTML=`<i>${text}</i>`; break;
    case 'h2': box.innerHTML=`<h2>${text}</h2>`; break;
    default: box.innerHTML=`<p>${text}</p>`;
  }
  animateBox(box);
}

// Box Layering ändern (vorne/hinten)
function changeBoxLayer(box){
  let action=prompt('Layer: vorne, hinten', 'vorne');
  if(action==='vorne') box.style.zIndex=++maxZIndex;
  if(action==='hinten') box.style.zIndex=--minZIndex;
}

// Globale Layer-Indizes
let maxZIndex=100;
let minZIndex=0;

// Kontextmenü erweitern
function extendBoxContextMenu(box){
  box.oncontextmenu=function(e){
    e.preventDefault();
    let action=prompt('Option: color, size, image, text, layer');
    if(action==='color') changeBoxColor(box);
    if(action==='size') resizeBox(box);
    if(action==='image') insertImageInBox(box);
    if(action==='text') formatTextInBox(box);
    if(action==='layer') changeBoxLayer(box);
  };
}

// Alle Boxen für erweitertes Kontextmenü aktivieren
function initExtendedBoxMenus(){
  document.querySelectorAll('.layoutBox').forEach(box=>{
    extendBoxContextMenu(box);
  });
}

// Initialisierung Layout-Editor Erweiterungen
document.addEventListener('DOMContentLoaded',()=>{
  initExtendedBoxMenus();
});
</script>
<script>
// Endgültiger Layout-Editor Feinschliff
function initFinalLayoutEditor(){
  document.querySelectorAll('.layoutBox').forEach(box=>{
    enableSmoothDrag(box);
    enableBoxEditing(box);
    extendBoxContextMenu(box);
    applyBoxStyles(box);
  });
}

// Drag & Drop sanfte Animationen
function animateAllBoxes(){
  document.querySelectorAll('.layoutBox').forEach(box=>{
    box.style.transition='all 0.2s ease';
    box.onmouseenter=()=>{ box.style.transform='scale(1.02)'; box.style.boxShadow='5px 5px 12px rgba(0,0,0,0.3)'; };
    box.onmouseleave=()=>{ box.style.transform='scale(1)'; box.style.boxShadow='3px 3px 8px rgba(0,0,0,0.2)'; };
  });
}

// Box mit Text + Bild erstellen und direkt zentrieren
function createCenteredBox(text='', imageUrl=''){
  let canvas=document.getElementById('layoutCanvas');
  if(!canvas) return;
  let box=document.createElement('div');
  box.className='layoutBox box gold-frame';
  box.style.width='150px'; box.style.height='100px';
  box.style.position='absolute';
  box.style.top='50%'; box.style.left='50%';
  box.style.transform='translate(-50%, -50%)';
  box.style.padding='6px';
  box.style.cursor='move';
  formatBoxContent(box, text, imageUrl);
  canvas.appendChild(box);
  initFinalLayoutEditor();
}

// Live Box-Hover Effekte für alle Boxen
function initBoxHoverEffects(){
  document.querySelectorAll('.layoutBox').forEach(box=>{
    box.addEventListener('mouseenter',()=>{ box.style.borderColor='darkgoldenrod'; });
    box.addEventListener('mouseleave',()=>{ box.style.borderColor='gold'; });
  });
}

// Initialisierung nach DOM geladen
document.addEventListener('DOMContentLoaded',()=>{
  initFinalLayoutEditor();
  animateAllBoxes();
  initBoxHoverEffects();
});

// Optional: Test-Boxen für fertige Schulzeitung
document.addEventListener('DOMContentLoaded',()=>{
  createCenteredBox('Überschrift', '');
  createCenteredBox('Artikeltext hier...', '');
  createCenteredBox('Bildbox', 'https://via.placeholder.com/120x80');
});
</script>
<script>
// Interaktive Umblätter-Animation für Artikel
function addPageFlipEffect(articleDiv){
  articleDiv.style.transition='transform 0.6s ease';
  articleDiv.style.transformStyle='preserve-3d';
  articleDiv.onmouseenter=()=>{ articleDiv.style.transform='rotateY(5deg)'; };
  articleDiv.onmouseleave=()=>{ articleDiv.style.transform='rotateY(0deg)'; };
}

// Automatische Artikel Boxen erstellen
function createArticleBox(title, content){
  let canvas=document.getElementById('mainContent');
  if(!canvas) return;
  let box=document.createElement('div');
  box.className='articleBox box gold-frame';
  box.style.width='90%';
  box.style.margin='12px auto';
  box.style.padding='8px';
  box.style.background='ivory';
  box.innerHTML=`<h2>${title}</h2><p>${content}</p>`;
  addPageFlipEffect(box);
  canvas.appendChild(box);
}

// Interaktive Scroll-Effekte für Artikel
function enableScrollAnimation(){
  window.addEventListener('scroll',()=>{
    document.querySelectorAll('.articleBox').forEach(box=>{
      let rect=box.getBoundingClientRect();
      if(rect.top<window.innerHeight && rect.bottom>0){
        box.style.transform='translateY(0)';
        box.style.opacity=1;
        box.style.transition='all 0.6s ease';
      } else {
        box.style.transform='translateY(20px)';
        box.style.opacity=0.6;
      }
    });
  });
}

// Initial Artikel generieren (Beispiel)
document.addEventListener('DOMContentLoaded',()=>{
  createArticleBox('Schulzeitung Ausgabe April', 'Willkommen zur neuen Ausgabe unserer Schulzeitung. Hier gibt es spannende Artikel über Sport, Kultur und die neuesten Events an unserer Schule.');
  createArticleBox('Interview mit dem Schulleiter', 'Wir haben Herrn Müller zu aktuellen Themen befragt und spannende Einblicke bekommen.');
  createArticleBox('Rätsel Ecke', 'Teste dein Wissen mit unseren kniffligen Rätseln und Denksportaufgaben!');
  enableScrollAnimation();
});

// Artikel Layout-Anpassung
function adjustArticleLayout(){
  document.querySelectorAll('.articleBox').forEach(box=>{
    box.style.boxShadow='3px 3px 10px rgba(0,0,0,0.2)';
    box.style.borderRadius='6px';
    box.style.transition='all 0.3s ease';
  });
}

// Initial Layout fixen
document.addEventListener('DOMContentLoaded',()=>{
  adjustArticleLayout();
});
</script>
