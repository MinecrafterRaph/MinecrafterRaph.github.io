<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Retro Gazette – Schulzeitung</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: "Georgia", "Times New Roman", serif;
        background: var(--bg, #f5f0e6);
        color: var(--text, #222);
        font-size: var(--fontSize, 16px);
    }

    .page {
        max-width: var(--width, 900px);
        margin: 40px auto;
        padding: 40px;
        background: #fffdf6;
        border: 1px solid #333;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .masthead {
        text-align: center;
        border-bottom: 3px double #000;
        padding-bottom: 10px;
        margin-bottom: 20px;
    }

    .masthead h1 {
        margin: 0;
        font-size: 3rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
    }

    .nav {
        position: sticky;
        top: 0;
        background: #f5f0e6;
        border-bottom: 1px solid #aaa;
        padding: 8px 0;
        z-index: 10;
    }

    .nav-inner {
        max-width: 900px;
        margin: 0 auto;
        display: flex;
        gap: 15px;
        font-size: 0.9rem;
    }

    .nav a {
        text-decoration: none;
        color: #222;
        text-transform: uppercase;
        letter-spacing: 0.1em;
    }

    .columns {
        display: flex;
        gap: 20px;
        margin-top: 10px;
    }

    .col {
        flex: 1;
        text-align: justify;
    }

    .image-placeholder {
        border: 1px solid #555;
        background: #eee;
        height: 160px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 10px 0 15px;
    }
</style>
