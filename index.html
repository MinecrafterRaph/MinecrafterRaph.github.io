<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Schulzeitung Interaktiv</title>
<style>
body { margin:0; font-family: 'Times New Roman', serif; background:#fdf8f0; color:#222; }
nav { background:#3a2c1b; color:#fff; padding:10px; display:flex; gap:12px; border-bottom:3px solid gold; }
nav button { background:#5b482b; color:#fff; border:none; padding:8px 16px; cursor:pointer; border-radius:4px; font-weight:bold; border:1px solid #d4af37; }
nav button:hover { background:#7c5e3e; }
.box { background:#fffaf0; border:2px solid #d4af37; margin:12px; padding:12px; box-shadow:3px 3px 10px #aaa; border-radius:6px; }
.hidden { display:none; }
input, textarea { width:100%; margin:5px 0; padding:6px; font-family:'Times New Roman', serif; border-radius:4px; border:1px solid #aaa; }
textarea { min-height:120px; }
h2, h3 { text-shadow: 1px 1px 2px #ccc; color:#4b3e2b; }
.gold-frame { border:2px solid #d4af37; padding:8px; border-radius:6px; box-shadow:1px 1px 6px #aaa; transition:transform 0.5s; }
.gold-frame:hover { transform:scale(1.02); }
</style>
</head>
<body>
<nav>
<b>Schulzeitung</b>
<button onclick="show('home')">Start</button>
<button onclick="show('archive')">Archiv</button>
<button onclick="show('editor')">Editor</button>
<button onclick="showLogin()">Login</button>
<button onclick="adminAccess()">Admin</button>
<button onclick="window.location.href='comments.html'">Kommentare</button>
</nav>

<div id="loginBox" class="box hidden">
<h3>Email Login</h3>
<input id="email" placeholder="Email-Adresse">
<button onclick="login()">Login</button>
</div>

<div id="home" class="box"></div>
<div id="archive" class="hidden box"></div>
<div id="editor" class="hidden box"></div>
<div id="admin" class="hidden box"></div>
<div id="articleView" class="hidden box"></div>

<script>
let articles=[];
let submissions=[];
let approvedEmails=[];
let users=[];
let currentUser=null;

function show(id){
  ['home','archive','editor','admin','articleView'].forEach(x=>document.getElementById(x).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function showLogin(){
  document.getElementById('loginBox').classList.toggle('hidden');
}

function login(){
  let email=document.getElementById('email').value;
  let approved=approvedEmails.find(e=>e.email===email);
  if(!approved){alert('Email nicht freigegeben'); return;}
  currentUser=approved;
  alert('Eingeloggt als '+approved.role);
  if(approved.role==='admin'){renderAdmin(); show('admin');}
  else if(approved.role==='editor'){renderEditor(); show('editor');}
  else{show('home');}
}

function adminAccess(){
  let code=prompt('Admin-Code:');
  if(code==='13243!'){currentUser={role:'admin'}; renderAdmin(); show('admin');}
  else{alert('Falscher Code');}
}

function saveAll(){
  localStorage.setItem('articles',JSON.stringify(articles));
  localStorage.setItem('submissions',JSON.stringify(submissions));
  localStorage.setItem('approvedEmails',JSON.stringify(approvedEmails));
  localStorage.setItem('users',JSON.stringify(users));
}

function createArticle(title,content,cat){
  articles.push({id:Date.now(),title,content,category:cat,approved:true});
  saveAll();
  renderHome();
}

function renderHome(){
  let el=document.getElementById('home');
  el.innerHTML='<h2>Neueste Artikel</h2>';
  articles.slice(-5).reverse().forEach(a=>{
    let d=document.createElement('div');
    d.className='box gold-frame';
    d.innerHTML=`<h3>${a.title}</h3><small>${a.category}</small><p>${a.content.substring(0,200)}...</p><button onclick="showArticle(${a.id})">Artikel anzeigen</button>`;
    el.appendChild(d);
  });
}

function showArticle(id){
  let a=articles.find(x=>x.id===id);
  if(!a) return;
  let el=document.getElementById('articleView');
  el.innerHTML=`<h2>${a.title}</h2><h4>${a.category}</h4><p>${a.content}</p><button onclick="show('home')">Zurück</button>`;
  show('articleView');
}

renderHome();
</script>
</body>
</html>
<script>
// Archiv rendern und Artikel-Boxen
function renderArchive(){
  let el=document.getElementById('archive');
  el.innerHTML='<h2>Archiv</h2>';
  articles.forEach(a=>{
    let d=document.createElement('div');
    d.className='box gold-frame';
    d.innerHTML=`<h3>${a.title}</h3><small>${a.category}</small>
      <p>${a.content.substring(0,150)}...</p>
      <button onclick="showArticlePageById(${a.id})">Artikel anzeigen</button>`;
    el.appendChild(d);
  });
}

// Page-Flip Grundstruktur
function showArticlePageById(id){
  let index=articles.findIndex(a=>a.id===id);
  showArticlePage(index);
}

let currentPageIndex=0;

function showArticlePage(index){
  if(!articles[index]) return;
  currentPageIndex=index;
  let article=articles[index];
  let el=document.getElementById('articleView');
  el.innerHTML='';

  // Page-Flip Container
  let pageContainer=document.createElement('div');
  pageContainer.className='article-page';
  
  article.content.match(/.{1,500}/g).forEach((chunk,i)=>{
    let page=document.createElement('div');
    page.className='page';
    page.innerHTML=`<div class="page-content">${chunk}</div>
      <div style="margin-top:10px;">
      <button onclick="prevArticlePage()">Zurück</button>
      <button onclick="nextArticlePage()">Vor</button>
      </div>`;
    pageContainer.appendChild(page);
  });

  el.appendChild(pageContainer);
  show('articleView');
}

function nextArticlePage(){
  if(currentPageIndex+1<articles.length){
    currentPageIndex++;
    showArticlePage(currentPageIndex);
  }
}

function prevArticlePage(){
  if(currentPageIndex-1>=0){
    currentPageIndex--;
    showArticlePage(currentPageIndex);
  }
}

// Animation für Page-Flip (einfacher Effekt)
function addFlipAnimation(page){
  page.style.transition='transform 0.8s';
  page.style.transform='rotateY(180deg)';
}

// Archiv-Filter nach Kategorie
function filterArchive(cat){
  let filtered=articles.filter(a=>a.category===cat);
  let el=document.getElementById('archive');
  el.innerHTML=`<h2>Archiv - ${cat}</h2>`;
  filtered.forEach(a=>{
    let d=document.createElement('div');
    d.className='box gold-frame';
    d.innerHTML=`<h3>${a.title}</h3><small>${a.category}</small>
      <p>${a.content.substring(0,150)}...</p>
      <button onclick="showArticlePageById(${a.id})">Artikel anzeigen</button>`;
    el.appendChild(d);
  });
}

// Initial render Archive
renderArchive();
</script>
<script>
// Editor rendern
function renderEditor(){
  let el=document.getElementById('editor');
  el.innerHTML=`
    <h2>Editor</h2>
    <div class="toolbar">
      <button onclick="document.execCommand('bold',false,null)">B</button>
      <button onclick="document.execCommand('italic',false,null)">I</button>
      <button onclick="document.execCommand('insertUnorderedList',false,null)">Liste</button>
      <button onclick="insertLink()">Link</button>
      <button onclick="insertImage()">Bild</button>
      <button onclick="insertTable()">Tabelle</button>
    </div>
    <div id="editorBox" class="editor-box" contenteditable="true"></div>
    <label>Animation:</label>
    <select id="animationList">
      <option value="none">Keine</option>
      <option value="fade">Fade</option>
      <option value="slide">Slide</option>
      <option value="bounce">Bounce</option>
      <option value="zoom">Zoom</option>
    </select>
    <button onclick="saveRichText()">Speichern</button>
  `;
}

// Editor Funktionen
function insertImage(){
  let url=prompt('Bild URL:');
  if(url) document.execCommand('insertImage',false,url);
}

function insertLink(){
  let url=prompt('Link URL:');
  if(url) document.execCommand('createLink',false,url);
}

function insertTable(){
  let rows=parseInt(prompt('Anzahl Reihen:'));
  let cols=parseInt(prompt('Anzahl Spalten:'));
  if(!rows || !cols) return;
  let html='<table class="table-editor">';
  for(let r=0;r<rows;r++){
    html+='<tr>';
    for(let c=0;c<cols;c++){ html+='<td>Text</td>'; }
    html+='</tr>';
  }
  html+='</table>';
  document.execCommand('insertHTML',false,html);
}

function saveRichText(){
  let content=document.getElementById('editorBox').innerHTML;
  let title=prompt('Titel des Artikels:');
  let category=prompt('Kategorie:');
  let animation=document.getElementById('animationList').value;
  if(title && category && content){
    createArticle(title,content,category);
    articles[articles.length-1].animations=[animation];
    saveAll();
    alert('Artikel gespeichert!');
  }
}

// Editor initial render
renderEditor();
</script>
<script>
// Erweiterte Animationen beim Speichern
function applyAnimation(el,animation){
  switch(animation){
    case 'fade': el.style.transition='opacity 1s'; el.style.opacity=0; setTimeout(()=>el.style.opacity=1,10); break;
    case 'slide': el.style.transition='transform 0.5s'; el.style.transform='translateX(-100%)'; setTimeout(()=>el.style.transform='translateX(0)',10); break;
    case 'bounce': el.style.animation='bounceAnim 1s'; break;
    case 'zoom': el.style.transition='transform 0.5s'; el.style.transform='scale(0)'; setTimeout(()=>el.style.transform='scale(1)',10); break;
  }
}

// Drag & Drop Editor
function enableDragDrop(){
  let editorBox=document.getElementById('editorBox');
  editorBox.addEventListener('dragstart',e=>{ e.dataTransfer.setData('text/html',e.target.outerHTML); });
  editorBox.addEventListener('dragover',e=>e.preventDefault());
  editorBox.addEventListener('drop',e=>{
    e.preventDefault();
    let data=e.dataTransfer.getData('text/html');
    let range=document.caretRangeFromPoint(e.clientX,e.clientY);
    if(range) { range.insertNode(new DOMParser().parseFromString(data,'text/html').body.firstChild); }
  });
}

// Key Shortcuts
document.addEventListener('keydown',e=>{
  if(e.ctrlKey && e.key==='b'){ document.execCommand('bold'); e.preventDefault(); }
  if(e.ctrlKey && e.key==='i'){ document.execCommand('italic'); e.preventDefault(); }
  if(e.ctrlKey && e.key==='l'){ document.execCommand('insertUnorderedList'); e.preventDefault(); }
});

// Animation CSS Keyframes
let style=document.createElement('style');
style.innerHTML=`
@keyframes bounceAnim{
  0%{transform:translateY(0);}
  30%{transform:translateY(-20px);}
  50%{transform:translateY(0);}
  70%{transform:translateY(-10px);}
  100%{transform:translateY(0);}
}
.table-editor td{border:1px solid #d4af37; padding:4px;}
.editor-box{border:2px solid #d4af37; min-height:300px; padding:8px; margin-top:8px;}
`;
document.head.appendChild(style);

// Editor Erweiterung: Vorschau
function previewArticle(){
  let content=document.getElementById('editorBox').innerHTML;
  let win=window.open('','_blank','width=600,height=800');
  win.document.write('<html><head><title>Vorschau</title></head><body>'+content+'</body></html>');
  win.document.close();
}

// Erweiterte Tabellen-Optionen
function insertAdvancedTable(){
  let rows=parseInt(prompt('Reihen:'));
  let cols=parseInt(prompt('Spalten:'));
  let table='<table class="table-editor">';
  for(let r=0;r<rows;r++){
    table+='<tr>';
    for(let c=0;c<cols;c++){
      table+='<td style="padding:6px;border:1px solid #d4af37;">Zelle</td>';
    }
    table+='</tr>';
  }
  table+='</table>';
  document.execCommand('insertHTML',false,table);
}

enableDragDrop();
</script>
<script>
// Admin Panel rendern
function renderAdmin(){
  let el=document.getElementById('admin');
  el.innerHTML=`
    <h2>Admin Panel</h2>
    <div class="box gold-frame">
      <h3>Email-Freigabe</h3>
      <input id="newEmail" placeholder="Email hinzufügen">
      <select id="roleSelect">
        <option value="editor">Editor</option>
        <option value="reader">Leser</option>
        <option value="admin">Admin</option>
      </select>
      <button onclick="addApprovedEmail()">Freigeben</button>
      <div id="approvedList"></div>
    </div>
    <div class="box gold-frame">
      <h3>Eingereichte Artikel</h3>
      <div id="submissionsList"></div>
    </div>
  `;
  renderApprovedEmails();
  renderSubmissions();
}

// Freigeben von Emails
function addApprovedEmail(){
  let email=document.getElementById('newEmail').value;
  let role=document.getElementById('roleSelect').value;
  if(!email) return alert('Email fehlt!');
  if(!approvedEmails.find(e=>e.email===email)){
    approvedEmails.push({email,role});
    saveAll();
    renderApprovedEmails();
    alert(email+' freigegeben als '+role);
  } else { alert('Email bereits freigegeben'); }
}

// Anzeige der freigegebenen Emails
function renderApprovedEmails(){
  let el=document.getElementById('approvedList');
  el.innerHTML='<ul>'+approvedEmails.map(e=>`<li>${e.email} - ${e.role} <button onclick="removeApprovedEmail('${e.email}')">Entfernen</button></li>`).join('')+'</ul>';
}

function removeApprovedEmail(email){
  approvedEmails=approvedEmails.filter(e=>e.email!==email);
  saveAll();
  renderApprovedEmails();
}

// Submission Verwaltung
function renderSubmissions(){
  let el=document.getElementById('submissionsList');
  if(submissions.length===0){ el.innerHTML='<p>Keine neuen Einreichungen</p>'; return; }
  el.innerHTML='';
  submissions.forEach((s,i)=>{
    let d=document.createElement('div');
    d.className='box gold-frame';
    d.innerHTML=`<h4>${s.title}</h4><small>${s.category}</small><p>${s.content.substring(0,200)}...</p>
      <button onclick="approveSubmission(${i})">Freigeben</button>
      <button onclick="rejectSubmission(${i})">Ablehnen</button>`;
    el.appendChild(d);
  });
}

function approveSubmission(i){
  let s=submissions[i];
  createArticle(s.title,s.content,s.category);
  submissions.splice(i,1);
  saveAll();
  renderSubmissions();
}

function rejectSubmission(i){
  submissions.splice(i,1);
  saveAll();
  renderSubmissions();
}
</script>
<script>
// Submission Panel rendern (für Leser oder Redakteure)
function renderSubmissionPanel(){
  let el=document.getElementById('editor');
  el.innerHTML=`
    <h2>Artikel einreichen</h2>
    <div class="box gold-frame">
      <input id="subTitle" placeholder="Titel">
      <textarea id="subContent" placeholder="Artikelinhalt"></textarea>
      <input id="subCategory" placeholder="Kategorie">
      <button onclick="submitArticle()">Einreichen</button>
    </div>
    <h3>Eingereichte Artikel (Status)</h3>
    <div id="mySubmissions"></div>
  `;
  renderMySubmissions();
}

// Submission einreichen
function submitArticle(){
  let title=document.getElementById('subTitle').value;
  let content=document.getElementById('subContent').value;
  let category=document.getElementById('subCategory').value;
  if(!title||!content||!category){ alert('Bitte alle Felder ausfüllen'); return; }
  submissions.push({title,content,category,author:currentUser.email});
  saveAll();
  alert('Artikel eingereicht und wartet auf Freigabe');
  renderMySubmissions();
}

// Eigene Submissions anzeigen
function renderMySubmissions(){
  let el=document.getElementById('mySubmissions');
  let mySubs=submissions.filter(s=>s.author===currentUser.email);
  if(mySubs.length===0){ el.innerHTML='<p>Keine Einreichungen</p>'; return; }
  el.innerHTML='';
  mySubs.forEach((s,i)=>{
    let d=document.createElement('div');
    d.className='box gold-frame';
    d.innerHTML=`<h4>${s.title}</h4><small>${s.category}</small>
      <p>${s.content.substring(0,150)}...</p>`;
    el.appendChild(d);
  });
}

// Admin Approval System (Zusatz)
function checkPendingSubmissions(){
  if(currentUser?.role==='admin'){
    renderSubmissions();
  }
}

// Einreichung automatisch in Approval Queue speichern
function submitToAdminQueue(sub){
  submissions.push(sub);
  saveAll();
  checkPendingSubmissions();
}

// Beispiel: Automatische Freigabe bei Editor
function autoApproveSubmission(sub){
  if(currentUser?.role==='editor'){
    createArticle(sub.title,sub.content,sub.category);
    saveAll();
    alert('Artikel direkt veröffentlicht');
  } else {
    submitToAdminQueue(sub);
  }
}
</script>
<script>
// Mehrseitige Artikelseiten rendern mit Page-Flip
function renderArticlePages(article){
  let el=document.getElementById('articleView');
  el.innerHTML='';
  let container=document.createElement('div');
  container.className='article-pages-container';
  
  // Splitte Artikel in Seiten à 400 Zeichen
  let pages=article.content.match(/.{1,400}/g);
  pages.forEach((text,i)=>{
    let page=document.createElement('div');
    page.className='article-page gold-frame';
    page.style.minHeight='200px';
    page.innerHTML=`<div class="page-text">${text}</div>
      <div style="margin-top:10px;">
        <button onclick="prevArticlePage()">Zurück</button>
        <button onclick="nextArticlePage()">Vor</button>
      </div>`;
    container.appendChild(page);
  });
  el.appendChild(container);
  show('articleView');
  applyPageFlip(container);
}

// Page-Flip Effekt
function applyPageFlip(container){
  let pages=container.children;
  for(let i=0;i<pages.length;i++){
    pages[i].style.transition='transform 0.6s';
    pages[i].style.transform='rotateY(0deg)';
    pages[i].style.backfaceVisibility='hidden';
    if(i>0) pages[i].style.transform='rotateY(180deg)';
  }
}

// Navigation durch Seiten
function nextArticlePage(){
  let container=document.querySelector('.article-pages-container');
  if(!container) return;
  let pages=container.children;
  for(let i=0;i<pages.length;i++){
    let deg=parseInt(pages[i].style.transform.replace('rotateY(','').replace('deg)',''));
    if(deg===0 && i<pages.length-1){
      pages[i].style.transform='rotateY(-180deg)';
      pages[i+1].style.transform='rotateY(0deg)';
      break;
    }
  }
}

function prevArticlePage(){
  let container=document.querySelector('.article-pages-container');
  if(!container) return;
  let pages=container.children;
  for(let i=pages.length-1;i>=0;i--){
    let deg=parseInt(pages[i].style.transform.replace('rotateY(','').replace('deg)',''));
    if(deg===0 && i>0){
      pages[i].style.transform='rotateY(180deg)';
      pages[i-1].style.transform='rotateY(0deg)';
      break;
    }
  }
}
</script>
<script>
// Quiz und Rätsel Container
function renderQuiz(){
  let el=document.getElementById('editor');
  el.innerHTML=`
    <h2>Rätsel / Quiz erstellen</h2>
    <div class="box gold-frame">
      <input id="quizQuestion" placeholder="Frage">
      <input id="quizAnswer" placeholder="Antwort">
      <button onclick="addQuiz()">Hinzufügen</button>
    </div>
    <h3>Rätsel</h3>
    <div id="quizList"></div>
  `;
  renderQuizList();
}

let quizzes=[];

// Quiz hinzufügen
function addQuiz(){
  let question=document.getElementById('quizQuestion').value;
  let answer=document.getElementById('quizAnswer').value;
  if(!question || !answer){ alert('Frage und Antwort erforderlich'); return; }
  quizzes.push({question,answer});
  saveAll();
  renderQuizList();
}

// Quiz Liste rendern
function renderQuizList(){
  let el=document.getElementById('quizList');
  el.innerHTML='';
  quizzes.forEach((q,i)=>{
    let d=document.createElement('div');
    d.className='box gold-frame';
    d.innerHTML=`<p>${q.question}</p>
      <input id="quizInput${i}" placeholder="Antwort">
      <button onclick="checkQuiz(${i})">Prüfen</button>
      <span id="quizResult${i}"></span>`;
    el.appendChild(d);
  });
}

// Quiz prüfen
function checkQuiz(i){
  let userAns=document.getElementById(`quizInput${i}`).value.toLowerCase();
  let correctAns=quizzes[i].answer.toLowerCase();
  let res=document.getElementById(`quizResult${i}`);
  if(userAns===correctAns) res.innerHTML='<b>✅ Richtig!</b>';
  else res.innerHTML=`<b>❌ Falsch! Richtige Antwort: ${quizzes[i].answer}</b>`;
}

// Quiz Anzeige im Artikel
function renderQuizInArticle(article){
  let el=document.getElementById('articleView');
  el.innerHTML='<h2>Rätsel / Quiz</h2>';
  quizzes.forEach((q,i)=>{
    let d=document.createElement('div');
    d.className='box gold-frame';
    d.innerHTML=`<p>${q.question}</p>
      <input id="quizInputView${i}" placeholder="Antwort">
      <button onclick="checkQuizView(${i})">Prüfen</button>
      <span id="quizResultView${i}"></span>`;
    el.appendChild(d);
  });
}

// Prüfung im Artikel-View
function checkQuizView(i){
  let userAns=document.getElementById(`quizInputView${i}`).value.toLowerCase();
  let correctAns=quizzes[i].answer.toLowerCase();
  let res=document.getElementById(`quizResultView${i}`);
  if(userAns===correctAns) res.innerHTML='<b>✅ Richtig!</b>';
  else res.innerHTML=`<b>❌ Falsch! Richtige Antwort: ${quizzes[i].answer}</b>`;
}
</script>
<script>
// Archiv Scroll-Effekte
function enableScrollAnimations(){
  let archive=document.getElementById('archive');
  archive.addEventListener('scroll',()=>{
    let boxes=archive.querySelectorAll('.box');
    boxes.forEach(b=>{
      let rect=b.getBoundingClientRect();
      if(rect.top < window.innerHeight && rect.bottom > 0){
        b.style.transform='translateY(0px)';
        b.style.opacity='1';
        b.style.transition='all 0.8s ease-out';
      } else {
        b.style.transform='translateY(20px)';
        b.style.opacity='0.5';
      }
    });
  });
}

// Goldrahmen Hover Effekt
function applyGoldHover(){
  document.querySelectorAll('.gold-frame').forEach(el=>{
    el.addEventListener('mouseenter',()=>{
      el.style.boxShadow='0 0 20px gold';
      el.style.transform='scale(1.03)';
    });
    el.addEventListener('mouseleave',()=>{
      el.style.boxShadow='3px 3px 10px #aaa';
      el.style.transform='scale(1)';
    });
  });
}

// Archiv Artikel-Filter Buttons
function renderArchiveFilters(){
  let el=document.getElementById('archive');
  let categories=[...new Set(articles.map(a=>a.category))];
  let btnContainer=document.createElement('div');
  btnContainer.style.marginBottom='8px';
  categories.forEach(c=>{
    let btn=document.createElement('button');
    btn.innerText=c;
    btn.onclick=()=>filterArchive(c);
    btnContainer.appendChild(btn);
  });
  el.prepend(btnContainer);
}

// Artikel Hover Animation
function applyArticleHover(){
  document.querySelectorAll('.article-page').forEach(page=>{
    page.addEventListener('mouseenter',()=>page.style.transform='scale(1.02)');
    page.addEventListener('mouseleave',()=>page.style.transform='scale(1)');
  });
}

// Initialisierung aller Effekte
function initVisualEffects(){
  enableScrollAnimations();
  applyGoldHover();
  applyArticleHover();
}

// Effekte nach Rendering anwenden
document.addEventListener('DOMContentLoaded',initVisualEffects);
</script>
<script>
// Archiv Scroll-Effekte

  let archive=document.getElementById('archive');
  archive.addEventListener('scroll',()=>{
    let boxes=archive.querySelectorAll('.box');
    boxes.forEach(b=>{
      let rect=b.getBoundingClientRect();
      if(rect.top < window.innerHeight && rect.bottom > 0){
        b.style.transform='translateY(0px)';
        b.style.opacity='1';
        b.style.transition='all 0.8s ease-out';

<script>
// WYSIWYG Editor initialisieren
function initEditor(){
  let editor=document.getElementById('editor');
  editor.innerHTML=`
    <h2>Artikel Editor</h2>
    <div class="toolbar box gold-frame" style="margin-bottom:6px;">
      <button onclick="formatText('bold')">Fett</button>
      <button onclick="formatText('italic')">Kursiv</button>
      <button onclick="formatText('underline')">Unterstrichen</button>
      <button onclick="insertTable()">Tabelle</button>
      <button onclick="insertMedia('image')">Bild</button>
      <button onclick="insertMedia('audio')">Audio</button>
      <button onclick="insertMedia('video')">Video</button>
    </div>
    <div id="editorContent" contenteditable="true" class="editor-box box gold-frame" style="min-height:200px;"></div>
    <button onclick="saveEditorContent()">Speichern</button>
  `;
}

// Text formatieren
function formatText(cmd){
  document.execCommand(cmd,false,null);
}

// Tabelle einfügen
function insertTable(){
  let rows=parseInt(prompt('Anzahl Zeilen?','2'));
  let cols=parseInt(prompt('Anzahl Spalten?','2'));
  if(isNaN(rows)||isNaN(cols)) return;
  let table='<table border="1" style="border-collapse:collapse;margin:8px 0;">';
  for(let r=0;r<rows;r++){
    table+='<tr>';
    for(let c=0;c<cols;c++){
      table+='<td>Text</td>';
    }
    table+='</tr>';
  }
  table+='</table>';
  document.execCommand('insertHTML',false,table);
}

// Medien einfügen (Bild/Audio/Video)
function insertMedia(type){
  let url=prompt('URL für '+type);
  if(!url) return;
  let html='';
  if(type==='image') html=`<img src="${url}" style="width:100%;margin:6px 0;border:2px solid gold;">`;
  if(type==='audio') html=`<audio controls style="margin:6px 0;"><source src="${url}" type="audio/mpeg">Ihr Browser unterstützt kein Audio.</audio>`;
  if(type==='video') html=`<video controls width="100%" style="margin:6px 0;"><source src="${url}" type="video/mp4">Ihr Browser unterstützt kein Video.</video>`;
  document.execCommand('insertHTML',false,html);
}

// Drag & Drop Media im Editor
function enableDragDrop(){
  let editorContent=document.getElementById('editorContent');
  editorContent.addEventListener('dragover',e=>e.preventDefault());
  editorContent.addEventListener('drop',e=>{
    e.preventDefault();
    let files=e.dataTransfer.files;
    for(let f of files){
      let reader=new FileReader();
      reader.onload=function(evt){
        let img=`<img src="${evt.target.result}" style="width:100%;margin:6px 0;border:2px solid gold;">`;
        document.execCommand('insertHTML',false,img);
      };
      if(f.type.startsWith('image/')) reader.readAsDataURL(f);
    }
  });
}

// Editor-Inhalt speichern
function saveEditorContent(){
  let content=document.getElementById('editorContent').innerHTML;
  currentArticle.content=content;
  saveAll();
  alert('Artikel gespeichert');
}

initEditor();
enableDragDrop();
</script>

<script>
// Rätsel/Quiz hinzufügen
function insertQuiz(){
  let question=prompt('Frage für das Quiz:');
  if(!question) return;
  let options=[];
  for(let i=0;i<4;i++){
    let opt=prompt('Option '+(i+1));
    if(!opt) return;
    options.push(opt);
  }
  let correct=parseInt(prompt('Nummer der richtigen Antwort (1-4)'))-1;
  if(isNaN(correct) || correct<0 || correct>3) return alert('Ungültige Antwort');
  let html='<div class="quiz box gold-frame" style="margin:8px 0;padding:6px;">';
  html+=`<p>${question}</p>`;
  options.forEach((o,i)=>{
    html+=`<button class="quizOption" onclick="checkAnswer(this,${i},${correct})">${o}</button>`;
  });
  html+='</div>';
  document.execCommand('insertHTML',false,html);
}

// Quiz prüfen
function checkAnswer(btn,index,correct){
  if(index===correct){
    btn.style.background='gold';
    btn.style.color='black';
    alert('Richtig!');
  } else{
    btn.style.background='gray';
    btn.style.color='white';
    alert('Falsch! Richtig war Option '+(correct+1));
  }

<script>
// Rätsel/Quiz hinzufügen
function insertQuiz(){
  let question=prompt('Frage für das Quiz:');
  if(!question) return;
  let options=[];
  for(let i=0;i<4;i++){
    let opt=prompt('Option '+(i+1));
    if(!opt) return;
    options.push(opt);
  }
  let correct=parseInt(prompt('Nummer der richtigen Antwort (1-4)'))-1;
  if(isNaN(correct) || correct<0 || correct>3) return alert('Ungültige Antwort');
  let html='<div class="quiz box gold-frame" style="margin:8px 0;padding:6px;">';
  html+=`<p>${question}</p>`;
  options.forEach((o,i)=>{
    html+=`<button class="quizOption" onclick="checkAnswer(this,${i},${correct})">${o}</button>`;
  });
  html+='</div>';
  document.execCommand('insertHTML',false,html);
}

// Quiz prüfen
function checkAnswer(btn,index,correct){
  if(index===correct){
    btn.style.background='gold';
    btn.style.color='black';
    alert('Richtig!');
  } else{
    btn.style.background='gray';
    btn.style.color='white';
    alert('Falsch! Richtig war Option '+(correct+1));
  }
}

<script>
// Scroll Animation für Artikel-Boxen
function applyScrollAnimations(){
  let boxes=document.querySelectorAll('.box');
  boxes.forEach(b=>{
    b.style.opacity='0';
    b.style.transform='translateY(30px)';
    b.style.transition='opacity 0.6s ease, transform 0.6s ease';
  });

  window.addEventListener('scroll',()=>{
    boxes.forEach(b=>{
      let rect=b.getBoundingClientRect();
      if(rect.top < window.innerHeight - 50){
        b.style.opacity='1';
        b.style.transform='translateY(0)';
      }
    });
  });
}

// Blätterbare Seiten Animation verbessern
function enhancePageFlip(){
  document.querySelectorAll('.page').forEach(p=>{
    p.style.cursor='pointer';
    p.addEventListener('mouseenter',()=>p.style.boxShadow='0 0 20px gold');
    p.addEventListener('mouseleave',()=>p.style.boxShadow='none');
    p.addEventListener('click',()=>{
      p.style.transition='transform 0.8s ease';
      p.style.transform='rotateY(180deg)';
    });
  });
}

// Smooth Scroll für interne Links
function initSmoothScroll(){
  document.querySelectorAll('a[href^="#"]').forEach(anchor=>{
    anchor.addEventListener('click',function(e){
      e.preventDefault();
      document.querySelector(this.getAttribute('href')).scrollIntoView({behavior:'smooth'});
    });
  });
}

// Artikel-Übergang beim Laden
function animateArticleLoad(){
  let pages=document.querySelectorAll('.page');
  pages.forEach((p,i)=>{
    p.style.opacity='0';
    p.style.transform='translateX(50px)';
    setTimeout(()=>{p.style.transition='opacity 0.5s ease, transform 0.5s ease';p.style.opacity='1';p.style.transform='translateX(0)';},i*100);
  });
}

// Initialisierung aller visuellen Effekte
document.addEventListener('DOMContentLoaded',()=>{
  applyScrollAnimations();
  enhancePageFlip();
  initSmoothScroll();
  animateArticleLoad();
});
</script>
<script>

  el.innerHTML=`<h3>Newsletter Anmeldung</h3>

    <button onclick="subscribeNewsletter()">Anmelden</button>

// Newsletter anmelden
function subscribeNewsletter(){
  let email=document.getElementById('newsletterEmail').value;
  if(!email) return alert('Bitte E-Mail eingeben');
  if(newsletterSubscribers.includes(email)) return alert('Du bist bereits angemeldet');
  newsletterSubscribers.push(email);
  document.getElementById('newsletterMsg').innerText='Danke! Du bist nun angemeldet.';
  saveAll();
}

// Neue Ausgabe Benachrichtigung (simuliert)
function notifyNewIssue(issueTitle){
  newsletterSubscribers.forEach(email=>{
    console.log(`Benachrichtigung an ${email}: Neue Ausgabe "${issueTitle}" verfügbar!`);
  });
}

// Neue Ausgabe erstellen erweitern
function createNewIssue(){
  let title=document.getElementById('newIssueTitle').value;
  let date=document.getElementById('newIssueDate').value;
  let sel=document.getElementById('newIssueArticles');
  let articleIds=[...sel.selectedOptions].map(o=>parseInt(o.value));
  if(!title || !date || articleIds.length===0) return alert('Alle Felder ausfüllen');
  let newIssue={id:issues.length,title,date,articles:articleIds};

}

</script>
<script>
// Suchfeld rendern
function renderSearchBar(){
  let el=document.getElementById('searchSection');
  if(!el) return;
  el.innerHTML=`<h3>Artikel Suche</h3>
    <input type="text" id="searchInput" placeholder="Suchbegriff" style="width:100%;margin-bottom:6px;">
    <select id="categoryFilter" style="width:100%;margin-bottom:6px;">
      <option value="">Alle Kategorien</option>
      <option value="Lokales">Lokales</option>
      <option value="Sport">Sport</option>
      <option value="Kultur">Kultur</option>
      <option value="Meinungen">Meinungen</option>
    </select>
    <button onclick="searchArticles()">Suchen</button>
    <div id="searchResults" style="margin-top:6px;"></div>`;
}

// Artikel durchsuchen
function searchArticles(){
  let term=document.getElementById('searchInput').value.toLowerCase();
  let category=document.getElementById('categoryFilter').value;
  let results=articles.filter(a=>{
    let match=(!term || a.title.toLowerCase().includes(term) || a.content.toLowerCase().includes(term));
    let catMatch=!category || a.category===category;
    return match && catMatch && a.status==='approved';
  });
  renderSearchResults(results, term);
}

// Suchergebnisse rendern
function renderSearchResults(results, term){
  let el=document.getElementById('searchResults');
  el.innerHTML='<h4>Ergebnisse:</h4>';
  if(results.length===0){ el.innerHTML+='<p>Keine Treffer</p>'; return; }
  results.forEach(a=>{
    let div=document.createElement('div');
    div.className='box gold-frame';
    let highlighted=a.content.replace(new RegExp(`(${term})`,'gi'), '<mark>$1</mark>');
    div.innerHTML=`<h4>${a.title}</h4><p>${highlighted.substring(0,150)}...</p>
      <button onclick="viewArticle(${a.id})">Artikel lesen</button>`;
    el.appendChild(div);
  });
}

// Artikelanzeige beim Klicken
function viewArticle(id){
  let a=articles.find(x=>x.id===id);
  if(!a) return alert('Artikel nicht gefunden');
  let el=document.getElementById('articleView');
  if(!el) return;
  el.innerHTML=`<h2>${a.title}</h2><p>${a.content}</p>`;
  renderCommentsForArticle(a.id);
  renderCommentForm(a.id);
}

// Initialisierung Suche
document.addEventListener('DOMContentLoaded',()=>{ renderSearchBar(); });
</script>
<script>
// Autorenprofile rendern
function renderAuthorProfiles(){
  let el=document.getElementById('authorsSection');
  if(!el) return;
  el.innerHTML='<h3>Autoren</h3>';
  users.filter(u=>u.role==='editor').forEach(u=>{
    let div=document.createElement('div');
    div.className='box gold-frame';
    div.style.margin='6px 0';
    div.innerHTML=`
      <img src="${u.avatar||'default-avatar.png'}" style="width:60px;height:60px;border-radius:50%;float:left;margin-right:12px;">
      <b>${u.name||u.email}</b><br>
      <small>${u.bio||'Keine Beschreibung'}</small>
      <div id="articles-${u.email}"></div>
    `;
    el.appendChild(div);
    renderAuthorArticles(u.email);
  });
}

// Liste eigener Artikel
function renderAuthorArticles(email){
  let container=document.getElementById('articles-'+email);
  container.innerHTML='<p>Artikel:</p>';
  let userArticles=articles.filter(a=>a.author===email && a.status==='approved');
  if(userArticles.length===0){ container.innerHTML+='<p>Keine veröffentlichten Artikel</p>'; return; }
  userArticles.forEach(a=>{
    let d=document.createElement('div');
    d.style.padding='2px 0';
    d.innerHTML=`<button onclick="viewArticle(${a.id})">${a.title}</button>`;
    container.appendChild(d);
  });
}

// Statistik für Autoren
function renderAuthorStats(){
  let el=document.getElementById('authorsStats');
  if(!el) return;
  el.innerHTML='<h3>Statistik</h3>';
  users.filter(u=>u.role==='editor').forEach(u=>{
    let userArticles=articles.filter(a=>a.author===u.email && a.status==='approved').length;
    let views=(u.views||0);
    let div=document.createElement('div');
    div.className='box gold-frame';
    div.innerHTML=`<b>${u.name||u.email}</b> - Artikel: ${userArticles}, Aufrufe: ${views}`;
    el.appendChild(div);
  });
}

// Autorenprofil Detailansicht
function viewAuthor(email){
  let user=users.find(u=>u.email===email);
  if(!user) return alert('Autor nicht gefunden');
  let el=document.getElementById('authorView');
  if(!el) return;
  el.innerHTML=`
    <h2>${user.name||user.email}</h2>
    <img src="${user.avatar||'default-avatar.png'}" style="width:120px;height:120px;border-radius:50%;">
    <p>${user.bio||'Keine Beschreibung'}</p>
    <h4>Artikel:</h4>
    <div id="authorArticlesDetail"></div>
  `;
  let container=document.getElementById('authorArticlesDetail');
  let userArticles=articles.filter(a=>a.author===email && a.status==='approved');
  userArticles.forEach(a=>{
    let d=document.createElement('div');
    d.className='box gold-frame';
    d.style.margin='4px 0';
    d.innerHTML=`<button onclick="viewArticle(${a.id})">${a.title}</button>`;
    container.appendChild(d);
  });
}

// Initialisierung Autorenprofile
document.addEventListener('DOMContentLoaded',()=>{
  renderAuthorProfiles();
  renderAuthorStats();
});
</script>
