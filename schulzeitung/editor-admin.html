<!DOCTYPE html>
<html lang="de" data-base="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Admin-Bereich für Editoren" />
    <title>Editor-Admin – Schulzeitung</title>
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <a class="skip-link" href="#main">Zum Inhalt springen</a>
    <header class="site-header" id="site-header"></header>
    <main id="main" class="section container" style="max-width: 62rem">
      <h1 class="ornament-heading">Editor-Admin</h1>
      <p class="intro-text">Arbeitsmodus, Standards und Hinweise für Editoren konfigurieren.</p>
      <section class="card">
        <div class="form-group">
          <label for="editor-notice">Hinweis für Editoren</label>
          <textarea id="editor-notice" rows="4"></textarea>
        </div>
        <div class="form-group">
          <label for="editor-default-status">Standardstatus für neue Artikel</label>
          <select id="editor-default-status">
            <option value="draft">Entwurf</option>
            <option value="review">Zur Freigabe</option>
          </select>
        </div>
        <button class="btn btn--primary" id="editor-save" type="button">Speichern</button>
      </section>
    </main>
    <footer class="site-footer" id="site-footer"></footer>
    <script type="module" src="assets/js/pages/editor-admin.js"></script>
  </body>
</html>
