<!DOCTYPE html>
<html lang="de" data-base="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Klassensprecher-Bereich der Schulzeitung" />
    <title>Klassensprecher – Schulzeitung</title>
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <a class="skip-link" href="#main">Zum Inhalt springen</a>
    <header class="site-header" id="site-header"></header>
    <main id="main" class="section container" style="max-width: 56rem">
      <h1 class="ornament-heading">Klassensprecher-Bereich</h1>
      <p class="form-hint">Einheitliches Layout, aber individuelle Inhalte je nach angemeldetem Konto.</p>

      <section class="card" style="margin-top: var(--space-md)">
        <h2>Dein Dashboard</h2>
        <p><strong>Name:</strong> <span id="ks-name"></span></p>
        <p><strong>Klasse:</strong> <span id="ks-class"></span></p>
        <p><strong>Rolle:</strong> <span id="ks-role"></span></p>
      </section>

      <section class="card" style="margin-top: var(--space-md)">
        <h2>Aktuelle Aufgaben</h2>
        <ul id="ks-tasks"></ul>
      </section>

      <section class="card" style="margin-top: var(--space-md)">
        <h2>Hinweise aus der Redaktion</h2>
        <p id="ks-notice"></p>
      </section>
    </main>
    <footer class="site-footer" id="site-footer"></footer>
    <script type="module" src="assets/js/pages/klassensprecher.js"></script>
  </body>
</html>
