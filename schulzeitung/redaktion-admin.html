<!DOCTYPE html>
<html lang="de" data-base="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Admin-Bereich für Redakteure" />
    <title>Redakteur-Admin – Schulzeitung</title>
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <a class="skip-link" href="#main">Zum Inhalt springen</a>
    <header class="site-header" id="site-header"></header>
    <main id="main" class="section container" style="max-width: 62rem">
      <h1 class="ornament-heading">Redakteur-Admin</h1>
      <p class="intro-text">Leitlinien, Themenfokus und Teamhinweise für die Redaktion pflegen.</p>
      <section class="card" aria-labelledby="ra-h">
        <h2 id="ra-h">Redaktions-Steuerung</h2>
        <div class="form-group">
          <label for="redakteur-notice">Hinweis für Redakteure</label>
          <textarea id="redakteur-notice" rows="4"></textarea>
        </div>
        <div class="form-group">
          <label for="redakteur-focus">Themenschwerpunkt dieser Woche</label>
          <input id="redakteur-focus" placeholder="z. B. Projektwoche und Schülervertretung" />
        </div>
        <button class="btn btn--primary" id="redakteur-save" type="button">Speichern</button>
      </section>
    </main>
    <footer class="site-footer" id="site-footer"></footer>
    <script type="module" src="assets/js/pages/redaktion-admin.js"></script>
  </body>
</html>
