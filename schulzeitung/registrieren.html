<!DOCTYPE html>
<html lang="de" data-base="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Registrierung als Leserin / Leser der Schulzeitung." />
    <title>Registrieren – Schulzeitung</title>
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <a class="skip-link" href="#main">Zum Inhalt springen</a>
    <header class="site-header" id="site-header"></header>
    <main id="main" class="section container" style="max-width: 28rem">
      <h1>Registrieren</h1>
      <p style="color: var(--color-ink-muted)">Als Leser registrieren (lokal im Browser gespeichert).</p>
      <div id="msg"></div>
      <form id="form-reg" class="card" style="margin-top: var(--space-lg)">
        <div class="form-group">
          <label for="displayName">Anzeigename</label>
          <input id="displayName" name="displayName" type="text" required />
        </div>
        <div class="form-group">
          <label for="email">E-Mail</label>
          <input id="email" name="email" type="email" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label for="password">Passwort</label>
          <input id="password" name="password" type="password" autocomplete="new-password" required minlength="4" />
        </div>
        <div class="form-group">
          <label for="captcha-answer">Sicherheitsabfrage</label>
          <p class="form-hint">Bitte gib die Zeichen aus dem Bild ein (Groß-/Kleinschreibung egal).</p>
          <div style="display:flex; gap: var(--space-sm); align-items: center; flex-wrap: wrap">
            <strong id="captcha-task" aria-live="polite"></strong>
            <button type="button" class="btn btn--ghost btn--small" id="captcha-refresh">Neu</button>
          </div>
          <input id="captcha-answer" name="captcha-answer" inputmode="text" autocapitalize="characters" autocomplete="off" spellcheck="false" required />
        </div>
        <button type="submit" class="btn btn--primary">Konto anlegen</button>
        <p class="form-hint" style="margin-top: var(--space-md)">
          Bereits registriert? <a href="login.html">Anmelden</a>
        </p>
      </form>
    </main>
    <footer class="site-footer" id="site-footer"></footer>
    <script type="module" src="assets/js/pages/register.js"></script>
  </body>
</html>
