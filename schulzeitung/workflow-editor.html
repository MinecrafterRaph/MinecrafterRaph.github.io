<!DOCTYPE html>
<html lang="de" data-base="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Workflow-Editor fuer Redaktoere" />
    <title>Workflow Editor – Schulzeitung</title>
    <link rel="stylesheet" href="assets/css/main.css" />
    <link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet" />
  </head>
  <body>
    <a class="skip-link" href="#main">Zum Inhalt springen</a>
    <header class="site-header" id="site-header"></header>
    <main id="main" class="section container">
      <h1 class="ornament-heading">Workflow Editor</h1>
      <p class="form-hint">Auftraege aus dem Admin-Bereich gestalten und an den Designer senden.</p>
      <div class="table-wrap">
        <table class="data-table" id="wf-table-editor">
          <thead><tr><th>Titel</th><th>Status</th><th>Aktion</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
      <section class="card" style="margin-top: var(--space-lg)">
        <input type="hidden" id="wf-id" />
        <div class="form-group">
          <label for="wf-title">Titel</label>
          <input id="wf-title" />
        </div>
        <div class="form-group">
          <label for="wf-designer">Designer zuweisen</label>
          <select id="wf-designer"></select>
        </div>
        <div class="form-group">
          <label for="wf-editor-notes">Notiz fuer Designer</label>
          <textarea id="wf-editor-notes" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label for="wf-editor-box">Layout/Content</label>
          <div class="editor-shell"><div id="wf-editor-box"></div></div>
        </div>
        <div class="form-group">
          <label for="wf-pdf">Zeitungs-PDF (optional)</label>
          <input id="wf-pdf" type="file" accept="application/pdf" />
          <div id="wf-pdf-info" class="form-hint">Kein PDF hinterlegt.</div>
          <div style="display:flex;gap:var(--space-sm);flex-wrap:wrap;margin-top:var(--space-sm)">
            <button class="btn btn--ghost btn--small" type="button" id="wf-pdf-remove">PDF entfernen</button>
            <a class="btn btn--ghost btn--small" id="wf-pdf-open" href="#" target="_blank" rel="noopener" style="display:none">PDF öffnen</a>
          </div>
        </div>
        <div style="display:flex; gap: var(--space-sm); flex-wrap: wrap">
          <button class="btn btn--ghost" type="button" id="wf-save-draft">Zwischenstand speichern</button>
          <button class="btn btn--primary" type="button" id="wf-send-designer">An Designer senden</button>
        </div>
      </section>
    </main>
    <footer class="site-footer" id="site-footer"></footer>
    <script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>
    <script type="module" src="assets/js/pages/workflow-editor.js"></script>
  </body>
</html>
